# TD25a — local reverse-proxy harness for TRUST_PROXY_HOP_COUNT QA.
#
# Behaves like ONE honest edge hop (a real single-hop LB/edge):
#   * $proxy_add_x_forwarded_for APPENDS the connecting peer's address to any
#     incoming X-Forwarded-For (comma-separated) — it NEVER replaces the header.
#     That is exactly what a trustworthy edge does, and exactly the topology
#     TRUST_PROXY_HOP_COUNT=1 is calibrated for (see the README table).
#   * A client-forged "X-Forwarded-For: 1.2.3.4" therefore arrives at the API as
#     "1.2.3.4, <client's real IP>" — with hop=1 Express takes the RIGHTMOST
#     (proxy-appended) entry, so the forgery never becomes a rate-limit identity.
#
# Used only via the optional `proxy-harness` compose profile (root
# docker-compose.yml). Never a production config.

events {}

http {
  server {
    listen 8080;

    location / {
      proxy_pass http://api:3001;
      proxy_set_header Host $host;
      # The single-hop append under test — the whole point of the harness:
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
