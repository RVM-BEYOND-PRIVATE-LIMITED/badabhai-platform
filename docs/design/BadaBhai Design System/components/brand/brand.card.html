<!-- @dsCard group="Components" viewport="700x680" name="Brand primitives" subtitle="Logo, chat bubbles, swipe job card, masked candidate" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); }
  .grid { display: grid; grid-template-columns: 360px 1fr; gap: 20px; align-items: start; }
  .grp h4 { font-family: var(--font-sans); font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin: 0 0 12px; }
  .grp + .grp { margin-top: 20px; }
  .chat { display: flex; flex-direction: column; gap: 10px; background: var(--surface-sunken); border-radius: var(--radius-lg); padding: 16px; }
  .logos { display: flex; flex-direction: column; gap: 14px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { BadaBhaiLogo, ChatBubble, JobCard, MaskedCandidate } = window.BadaBhaiDesignSystem_01ff85;

    function Demo() {
      return (
        <React.Fragment>
          <div className="grp" style={{ marginBottom: 20 }}>
            <h4>Logo</h4>
            <div className="logos">
              <div style={{ display: 'flex', gap: 24, alignItems: 'center', flexWrap: 'wrap' }}>
                <BadaBhaiLogo size={34} />
                <BadaBhaiLogo variant="mark" size={44} />
              </div>
              <div style={{ background: 'var(--surface-ink)', padding: '14px 18px', borderRadius: 14, display: 'inline-flex', width: 'fit-content' }}>
                <BadaBhaiLogo theme="ink" size={30} />
              </div>
            </div>
          </div>

          <div className="grid">
            <div className="grp">
              <h4>Chat — the front door</h4>
              <div className="chat">
                <ChatBubble from="bot" time="9:01">Namaste! Main aapka bada bhai. Aap CNC machine pe kaam karte hain?</ChatBubble>
                <ChatBubble from="user" time="9:01">Haan, 6 saal se.</ChatBubble>
                <ChatBubble from="user" voice duration="0:18" />
                <ChatBubble from="bot" time="9:02">Badhiya! Aapka resume taiyaar kar raha hoon 👍</ChatBubble>
              </div>
            </div>

            <div>
              <div className="grp">
                <h4>Swipe-to-apply job card</h4>
                <JobCard
                  title="CNC Operator"
                  company="Sharma Precision Works"
                  verified
                  location="Pimpri, Pune"
                  shift="Day shift"
                  salary="₹22,000–28,000 / mo"
                  tags={['Fanuc control', '2+ yrs', 'PF + ESI']}
                  vacanciesLeft={4}
                />
              </div>

              <div className="grp">
                <h4>Masked candidate → unlock</h4>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                  <MaskedCandidate trade="CNC Operator" experience="6 yrs" location="Pune" matchLabel="Strong match" masked />
                  <MaskedCandidate name="Ramesh Kumar" trade="CNC Operator" experience="6 yrs" location="Pune" masked={false} />
                </div>
              </div>
            </div>
          </div>
        </React.Fragment>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
