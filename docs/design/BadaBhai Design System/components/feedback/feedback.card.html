<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); }
  .grp { margin-bottom: 20px; }
  .grp h4 { font-family: var(--font-sans); font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin: 0 0 12px; }
  .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .toasts { display: flex; flex-direction: column; gap: 12px; max-width: 380px; }
  .pcol { display: flex; flex-direction: column; gap: 16px; max-width: 420px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { Dialog, Toast, Tooltip, ProgressBar, Button, IconButton } = window.BadaBhaiDesignSystem_01ff85;

    function Demo() {
      const [open, setOpen] = React.useState(false);
      const [sheet, setSheet] = React.useState(false);
      return (
        <React.Fragment>
          <div className="grp">
            <h4>Dialog &amp; bottom sheet</h4>
            <div className="row">
              <Button variant="primary" iconLeft="lock-key-open" onClick={() => setOpen(true)}>Unlock candidate</Button>
              <Button variant="secondary" onClick={() => setSheet(true)}>Open sheet</Button>
            </div>
          </div>

          <div className="grp">
            <h4>Toasts</h4>
            <div className="toasts">
              <Toast tone="brand" title="Your resume is ready" onClose={() => {}}>Download it or share on WhatsApp.</Toast>
              <Toast tone="success" title="Applied!" onClose={() => {}}>We'll alert the employer.</Toast>
              <Toast tone="danger" title="Couldn't send" onClose={() => {}}>Check your connection and retry.</Toast>
            </div>
          </div>

          <div className="grp">
            <h4>Tooltip</h4>
            <div className="row">
              <Tooltip label="Record a voice note"><IconButton icon="microphone" label="Voice note" variant="outline" /></Tooltip>
              <Tooltip label="Profile is 72% complete" placement="bottom"><IconButton icon="info" label="Info" variant="outline" /></Tooltip>
            </div>
          </div>

          <div className="grp" style={{ marginBottom: 0 }}>
            <h4>Progress</h4>
            <div className="pcol">
              <ProgressBar value={72} label="Profile strength" showValue />
              <ProgressBar value={40} tone="success" label="Applicant quota filled" showValue thick />
            </div>
          </div>

          <Dialog open={open} onClose={() => setOpen(false)} title="Unlock this candidate?"
            footer={<React.Fragment>
              <Button variant="ghost" onClick={() => setOpen(false)}>Cancel</Button>
              <Button variant="primary" iconLeft="lock-key-open" onClick={() => setOpen(false)}>Unlock for ₹40</Button>
            </React.Fragment>}>
            You'll see Ramesh's name and phone number. One unlock credit will be used.
          </Dialog>

          <Dialog open={sheet} sheet onClose={() => setSheet(false)} title="Filter jobs"
            footer={<Button variant="primary" block onClick={() => setSheet(false)}>Show 24 jobs</Button>}>
            Pick trades, distance, and shift to narrow your feed.
          </Dialog>
        </React.Fragment>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
