<!-- @dsCard group="Components" viewport="700x620" name="Forms" subtitle="Buttons, inputs, choices, switch, OTP" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); }
  .grp { background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 18px 20px; box-shadow: var(--shadow-sm); margin-bottom: 16px; }
  .grp h4 { font-family: var(--font-sans); font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin: 0 0 14px; }
  .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .row + .row { margin-top: 12px; }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { Button, IconButton, Input, Select, Checkbox, Radio, Switch, OtpInput } = window.BadaBhaiDesignSystem_01ff85;

    function Demo() {
      const [code, setCode] = React.useState('12');
      return (
        <React.Fragment>
          <div className="grp">
            <h4>Button — variants</h4>
            <div className="row">
              <Button variant="primary" iconLeft="lock-key-open">Unlock ₹40</Button>
              <Button variant="secondary">Skip</Button>
              <Button variant="tonal" iconLeft="download-simple">Resume</Button>
              <Button variant="ghost">Cancel</Button>
              <Button variant="success" iconLeft="check">Apply</Button>
              <Button variant="danger" iconLeft="x">Reject</Button>
            </div>
            <div className="row">
              <Button size="sm">Small</Button>
              <Button size="md">Medium</Button>
              <Button size="lg" iconRight="arrow-right">Large CTA</Button>
              <Button loading>Loading</Button>
              <Button disabled>Disabled</Button>
            </div>
          </div>

          <div className="grp">
            <h4>Icon button</h4>
            <div className="row">
              <IconButton icon="microphone" label="Voice note" variant="solid" size="lg" />
              <IconButton icon="bell" label="Alerts" variant="outline" />
              <IconButton icon="dots-three" label="More" />
              <IconButton icon="magnifying-glass" label="Search" size="sm" />
            </div>
          </div>

          <div className="grp">
            <h4>Inputs</h4>
            <div className="cols">
              <Input label="Phone number" iconLeft="phone" placeholder="98xxx xxxxx" inputMode="tel" />
              <Select label="Trade"><option>CNC Operator</option><option>VMC Operator</option><option>Welder</option></Select>
              <Input label="Full name" defaultValue="Ramesh" iconRight="check" />
              <Input label="City" error="Please choose a city" placeholder="Pune" />
            </div>
          </div>

          <div className="grp">
            <h4>Choices &amp; toggles</h4>
            <div className="row" style={{ gap: '24px' }}>
              <Checkbox defaultChecked label="Verified jobs only" />
              <Radio name="l" defaultChecked label="हिंदी" />
              <Radio name="l" label="English" />
              <Switch defaultChecked label="Show my phone" />
            </div>
          </div>

          <div className="grp" style={{ marginBottom: 0 }}>
            <h4>OTP — phone login</h4>
            <OtpInput length={4} value={code} onChange={setCode} />
          </div>
        </React.Fragment>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
