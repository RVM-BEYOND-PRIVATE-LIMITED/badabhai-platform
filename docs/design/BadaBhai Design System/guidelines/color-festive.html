<!-- @dsCard group="Colors" viewport="700x180" name="Festive accents" subtitle="Saffron, green, rani-pink, turquoise — the Desi Pop palette." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-card); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .chip { height: 58px; border-radius: var(--radius-md); box-shadow: var(--shadow-sm); }
  .name { font-size: 12px; font-weight: 700; color: var(--text-primary); margin-top: 9px; }
  .role { font-size: 11px; color: var(--text-muted); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); margin-top: 1px; }
  .note { font-size: 12px; color: var(--text-muted); margin-top: 16px; }
</style>
</head>
<body>
  <div class="grid">
    <div><div class="chip" style="background:var(--saffron-400)"></div><div class="name">Saffron</div><div class="role">tags · warm highlights</div><div class="hex">F29D10</div></div>
    <div><div class="chip" style="background:var(--green-500)"></div><div class="name">Green</div><div class="role">apply · verified · ₹</div><div class="hex">0E7A4F</div></div>
    <div><div class="chip" style="background:var(--pink-500)"></div><div class="name">Rani pink</div><div class="role">festive pop · sparingly</div><div class="hex">C2186A</div></div>
    <div><div class="chip" style="background:var(--teal-500)"></div><div class="name">Turquoise</div><div class="role">info · links · festive</div><div class="hex">0E8488</div></div>
  </div>
  <p class="note">Vermilion + green do the work; saffron warms; pink &amp; turquoise are festive accents used in small doses (borders, dots, illustration).</p>
</body>
</html>
