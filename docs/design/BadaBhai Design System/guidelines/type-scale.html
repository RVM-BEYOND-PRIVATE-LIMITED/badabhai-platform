<!-- @dsCard group="Type" viewport="700x300" name="Type scale" subtitle="Mobile-first ramp, 11 → 76px. Body floor 16px." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 28px; background: var(--surface-card); font-family: var(--font-display); color: var(--text-primary); }
  .line { display: flex; align-items: baseline; gap: 16px; padding: 3px 0; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 110px; flex: none; }
  .spec { font-weight: 700; line-height: 1.1; white-space: nowrap; }
</style>
</head>
<body>
  <div class="line"><span class="tok">6xl · 76</span><span class="spec" style="font-size:54px">Bada</span></div>
  <div class="line"><span class="tok">4xl · 48</span><span class="spec" style="font-size:42px">Resume ready</span></div>
  <div class="line"><span class="tok">2xl · 30</span><span class="spec" style="font-size:30px">Apply with one swipe</span></div>
  <div class="line"><span class="tok">xl · 24</span><span class="spec" style="font-size:24px">Browse verified jobs near you</span></div>
  <div class="line"><span class="tok">lg · 20</span><span class="spec" style="font-size:20px;font-family:var(--font-sans);font-weight:600">Section heading and lead copy</span></div>
  <div class="line"><span class="tok">base · 16</span><span class="spec" style="font-size:16px;font-family:var(--font-sans);font-weight:400">Body text — the floor for readable copy</span></div>
  <div class="line"><span class="tok">sm · 14</span><span class="spec" style="font-size:14px;font-family:var(--font-sans);font-weight:500;color:var(--text-muted)">Secondary / helper text</span></div>
  <div class="line"><span class="tok">xs · 12</span><span class="spec" style="font-size:12px;font-family:var(--font-sans);font-weight:700;letter-spacing:0.09em;text-transform:uppercase;color:var(--text-brand)">Eyebrow label</span></div>
</body>
</html>
