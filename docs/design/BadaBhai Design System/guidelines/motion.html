<!-- @dsCard group="Brand" viewport="700x230" name="Motion — the stamp" subtitle="Short ease-out everywhere; one spring for success." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--surface-card); font-family: var(--font-sans); color: var(--text-primary); }
  .wrap { display: flex; gap: 28px; align-items: center; }
  .stage { width: 150px; height: 150px; background: var(--surface-sunken); border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; flex: none; overflow: hidden; }
  .stamp { width: 84px; height: 84px; border-radius: 50%; background: var(--success); color: #fff; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 800; font-size: 40px; animation: stamp 1.8s var(--ease-stamp) infinite; }
  @keyframes stamp { 0% { transform: scale(0.2); opacity: 0; } 22% { transform: scale(1.08); opacity: 1; } 34% { transform: scale(1); } 80% { transform: scale(1); opacity: 1; } 100% { transform: scale(1); opacity: 0; } }
  ul { margin: 0; padding-left: 18px; }
  li { font-size: 15px; line-height: 1.7; color: var(--text-secondary); }
  li b { color: var(--text-primary); }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="stage"><div class="stamp">✓</div></div>
    <div>
      <ul>
        <li><b>Everyday:</b> fade + small slide, <span class="tok">--ease-out</span>, 140–220ms.</li>
        <li><b>The stamp:</b> spring overshoot for verify · unlock · apply · resume-ready.</li>
        <li><b>Press:</b> scale 0.97 + darken. <b>Hover:</b> +1 shade, lift.</li>
        <li>Nothing loops. <span class="tok">prefers-reduced-motion</span> zeroes it all.</li>
      </ul>
    </div>
  </div>
</body>
</html>
