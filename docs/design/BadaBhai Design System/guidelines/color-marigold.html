<!-- @dsCard group="Colors" viewport="700x172" name="Vermilion — brand" subtitle="Sindoor red — the BadaBhai brand. #E0371C base." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { flex: 1; height: 64px; }
  .labels { display: flex; gap: 0; margin-top: 10px; }
  .lab { flex: 1; text-align: center; }
  .lab .step { font-size: 11px; font-weight: 700; color: var(--text-primary); }
  .lab .hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); display: block; margin-top: 2px; }
  .star { color: var(--brand); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--vermilion-50)"></div>
    <div class="sw" style="background:var(--vermilion-100)"></div>
    <div class="sw" style="background:var(--vermilion-200)"></div>
    <div class="sw" style="background:var(--vermilion-300)"></div>
    <div class="sw" style="background:var(--vermilion-400)"></div>
    <div class="sw" style="background:var(--vermilion-500)"></div>
    <div class="sw" style="background:var(--vermilion-600)"></div>
    <div class="sw" style="background:var(--vermilion-700)"></div>
    <div class="sw" style="background:var(--vermilion-800)"></div>
    <div class="sw" style="background:var(--vermilion-900)"></div>
  </div>
  <div class="labels">
    <div class="lab"><span class="step">50</span><span class="hex">FCEAE3</span></div>
    <div class="lab"><span class="step">100</span><span class="hex">F8D0C3</span></div>
    <div class="lab"><span class="step">200</span><span class="hex">F1A78F</span></div>
    <div class="lab"><span class="step">300</span><span class="hex">E97D5E</span></div>
    <div class="lab"><span class="step">400</span><span class="hex">E35636</span></div>
    <div class="lab"><span class="step star">500 ★</span><span class="hex">E0371C</span></div>
    <div class="lab"><span class="step">600</span><span class="hex">C22A12</span></div>
    <div class="lab"><span class="step">700</span><span class="hex">9C220F</span></div>
    <div class="lab"><span class="step">800</span><span class="hex">7B1D11</span></div>
    <div class="lab"><span class="step">900</span><span class="hex">641A10</span></div>
  </div>
</body>
</html>
