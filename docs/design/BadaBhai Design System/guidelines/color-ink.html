<!-- @dsCard group="Colors" viewport="700x172" name="Ink — warm neutrals" subtitle="Warm brown — text, chrome, earthy dark sections." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { flex: 1; height: 64px; }
  .labels { display: flex; gap: 0; margin-top: 10px; }
  .lab { flex: 1; text-align: center; }
  .lab .step { font-size: 11px; font-weight: 700; color: var(--text-primary); }
  .lab .hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); display: block; margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--ink-50)"></div>
    <div class="sw" style="background:var(--ink-100)"></div>
    <div class="sw" style="background:var(--ink-200)"></div>
    <div class="sw" style="background:var(--ink-300)"></div>
    <div class="sw" style="background:var(--ink-400)"></div>
    <div class="sw" style="background:var(--ink-500)"></div>
    <div class="sw" style="background:var(--ink-600)"></div>
    <div class="sw" style="background:var(--ink-700)"></div>
    <div class="sw" style="background:var(--ink-800)"></div>
    <div class="sw" style="background:var(--ink-900)"></div>
    <div class="sw" style="background:var(--ink-950)"></div>
  </div>
  <div class="labels">
    <div class="lab"><span class="step">50</span><span class="hex">F8F1E4</span></div>
    <div class="lab"><span class="step">100</span><span class="hex">F1E7D5</span></div>
    <div class="lab"><span class="step">200</span><span class="hex">E7D9C2</span></div>
    <div class="lab"><span class="step">300</span><span class="hex">D3BF9F</span></div>
    <div class="lab"><span class="step">400</span><span class="hex">B29977</span></div>
    <div class="lab"><span class="step">500</span><span class="hex">8E7252</span></div>
    <div class="lab"><span class="step">600</span><span class="hex">6E5238</span></div>
    <div class="lab"><span class="step">700</span><span class="hex">523A26</span></div>
    <div class="lab"><span class="step">800</span><span class="hex">3D2A1A</span></div>
    <div class="lab"><span class="step">900</span><span class="hex">2A1A0E</span></div>
    <div class="lab"><span class="step">950</span><span class="hex">1C1108</span></div>
  </div>
</body>
</html>
