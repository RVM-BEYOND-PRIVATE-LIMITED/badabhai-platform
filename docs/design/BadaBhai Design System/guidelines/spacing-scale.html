<!-- @dsCard group="Spacing" viewport="700x250" name="Spacing scale" subtitle="4px base grid. Tokens --space-1 … --space-13." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 28px; background: var(--surface-card); font-family: var(--font-sans); }
  .line { display: flex; align-items: center; gap: 14px; padding: 2px 0; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 116px; flex: none; }
  .bar { height: 14px; background: var(--brand); border-radius: 3px; }
</style>
</head>
<body>
  <div class="line"><span class="tok">--space-1 · 4</span><div class="bar" style="width:4px"></div></div>
  <div class="line"><span class="tok">--space-2 · 8</span><div class="bar" style="width:8px"></div></div>
  <div class="line"><span class="tok">--space-3 · 12</span><div class="bar" style="width:12px"></div></div>
  <div class="line"><span class="tok">--space-4 · 16</span><div class="bar" style="width:16px"></div></div>
  <div class="line"><span class="tok">--space-5 · 20</span><div class="bar" style="width:20px"></div></div>
  <div class="line"><span class="tok">--space-6 · 24</span><div class="bar" style="width:24px"></div></div>
  <div class="line"><span class="tok">--space-7 · 32</span><div class="bar" style="width:32px"></div></div>
  <div class="line"><span class="tok">--space-8 · 40</span><div class="bar" style="width:40px"></div></div>
  <div class="line"><span class="tok">--space-9 · 48</span><div class="bar" style="width:48px"></div></div>
  <div class="line"><span class="tok">--space-10 · 64</span><div class="bar" style="width:64px"></div></div>
  <div class="line"><span class="tok">--space-11 · 80</span><div class="bar" style="width:80px"></div></div>
</body>
</html>
