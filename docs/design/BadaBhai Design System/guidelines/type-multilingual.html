<!-- @dsCard group="Type" viewport="700x250" name="Hinglish & multilingual" subtitle="Devanagari + Latin in one voice. Both families carry it." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--surface-card); color: var(--text-primary); }
  .block { margin-bottom: 18px; }
  .hi { font-family: var(--font-display); font-weight: 700; font-size: 30px; line-height: 1.2; margin: 0; }
  .roman { font-family: var(--font-sans); font-weight: 500; font-size: 18px; color: var(--text-secondary); margin: 4px 0 0; }
  .body-hi { font-family: var(--font-sans); font-weight: 400; font-size: 17px; line-height: 1.5; color: var(--text-secondary); margin: 0; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="block">
    <p class="hi">आपका रिज़्यूमे तैयार है 👍</p>
    <p class="roman">Aapka resume taiyaar hai — download karein.</p>
    <span class="tag">Baloo 2 · Devanagari display</span>
  </div>
  <div class="block" style="margin-bottom:0">
    <p class="body-hi">कोई टेस्ट नहीं। बस बात। · Koi test nahi. Bas baat.</p>
    <p class="body-hi">वेरिफाइड नौकरियाँ · सिर्फ़ एक स्वाइप में अप्लाई करें</p>
    <span class="tag">Mukta · Devanagari + Latin body</span>
  </div>
</body>
</html>
