<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Worker Job Feed" description="Mobile worker screen: filter chips + swipe-to-apply job card" -->
<helmet>
<script src="./ds-base.js"></script>
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
<style>
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;font-family:var(--font-sans);background:radial-gradient(130% 90% at 50% -10%, var(--paper-1), var(--paper-4))}
.frame{width:390px;background:var(--surface-page);border:13px solid #0b0a07;border-radius:46px;overflow:hidden;box-shadow:0 40px 90px rgba(23,21,15,.45)}
.scr{padding:20px 18px 22px}
.bar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.eyebrow{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted)}
.loc{display:flex;align-items:center;gap:5px;font-size:17px;font-weight:700;color:var(--text-primary);margin-top:2px}
.loc .ph-fill{color:var(--brand)}
.fbtn{width:44px;height:44px;border-radius:var(--radius-md);border:1.5px solid var(--border-strong);background:var(--surface-card);color:var(--text-secondary);display:flex;align-items:center;justify-content:center;font-size:20px}
.chips{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto}
.hint{display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;color:var(--text-muted);margin-top:16px}
.hint .ph{font-size:18px}
</style>
</helmet>
<div class="frame"><div class="scr">
<div class="bar">
<div><div class="eyebrow">Jobs near you</div><div class="loc"><i class="ph-fill ph-map-pin"></i> Pune · 15 km</div></div>
<div class="fbtn"><i class="ph ph-sliders-horizontal"></i></div>
</div>
<div class="chips">
<x-import component-from-global-scope="BadaBhaiDesignSystem_01ff85.Chip" icon="wrench" selected="{{ true }}" hint-size="92px,38px">CNC</x-import>
<x-import component-from-global-scope="BadaBhaiDesignSystem_01ff85.Chip" icon="wrench" hint-size="92px,38px">VMC</x-import>
<x-import component-from-global-scope="BadaBhaiDesignSystem_01ff85.Chip" icon="shield-check" hint-size="110px,38px">Verified</x-import>
</div>
<x-import component-from-global-scope="BadaBhaiDesignSystem_01ff85.JobCard" title="CNC Operator" company="Sharma Precision Works" verified="{{ true }}" location="Pimpri, Pune" shift="Day shift" salary="₹22,000–28,000 / mo" vacancies-left="{{ 4 }}" hint-size="100%,360px"></x-import>
<div class="hint"><i class="ph ph-hand-swipe-left"></i> Skip · Apply <i class="ph ph-hand-swipe-right"></i></div>
</div></div>
</x-dc>
</body>
</html>
