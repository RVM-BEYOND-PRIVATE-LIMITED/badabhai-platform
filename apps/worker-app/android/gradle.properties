# Single source of truth for the Gradle JVM. This key was DUPLICATED (two
# `org.gradle.jvmargs` lines); Java's Properties loader keeps the LAST one, so
# the first line's MaxMetaspaceSize=2G / HeapDumpOnOutOfMemoryError were dead
# config that looked active. This is the value that was actually in effect.
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dkotlin.daemon.jvm.options=-Xmx4g

android.useAndroidX=true
android.enableJetifier=true

# NOTE: do NOT commit `org.gradle.java.home` here. It was pinned to
# /usr/lib/jvm/java-17-openjdk-amd64 — a path that exists only on one Linux
# machine, so it broke every Windows build and forced a per-developer
# ~/.gradle/gradle.properties workaround. With the line gone Gradle resolves the
# JDK the normal way (Flutter's --local-engine / JAVA_HOME / the Studio JBR),
# which is correct on every platform. Pin a toolchain in build.gradle if a
# specific JDK is ever required — never a machine-local absolute path.
