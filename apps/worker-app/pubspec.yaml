name: badabhai_worker_app
description: BadaBhai worker app (Phase 1 scaffold) — chat-first worker profiling.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  # Crash reporting (FlutterFire). firebase_core boots the SDK from the native
  # config files (android/app/google-services.json, ios GoogleService-Info.plist);
  # firebase_crashlytics is the sink for Dart/Flutter crashes — native Crashlytics
  # alone only sees JVM/NDK crashes, which Flutter code never produces. Init is
  # fail-closed (see core/observability/crash_reporter.dart) so a device that
  # cannot start Firebase keeps running normally. iOS SDK 11 → iOS 13 floor.
  # crashlytics PINNED EXACT: 5.2.5's artifact is broken (imports the long-removed
  # `FirebasePlugin` symbol → won't compile against firebase_core_platform_interface
  # 7.1.0); 5.2.4 is the last compiling build. A caret would re-pull 5.2.5.
  firebase_core: ^4.12.0
  firebase_crashlytics: 5.2.4
  # Display (Baloo 2) + body (Mukta) of the "Desi Vernacular Pop" theme.
  # Both carry Devanagari for Hinglish/regional copy. Roboto Mono (data) is
  # self-hosted below so figures render identically offline.
  google_fonts: ^6.2.1
  # State management + DI for the feature-first / clean-architecture stack:
  # BLoC/Cubit for presentation, Equatable for immutable value states/models,
  # get_it as the composition-root service locator.
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  get_it: ^7.7.0
  # Declarative routing + the persistent 4-tab StatefulShellRoute shell
  # (ADR-0023). Replaces the Navigator-1.0 Map<String, WidgetBuilder> router.
  # NOTE: resume/kit PDF downloads are IN-APP now (core/util/pdf_downloader.dart
  # + a small MediaStore platform channel in MainActivity.kt) — url_launcher was
  # removed with openSignedPdf; the signed url never leaves the app.
  go_router: ^14.2.7
  # Persistent auth. The refresh token + device id live ONLY in
  # flutter_secure_storage (Android Keystore-backed); the access token stays in
  # memory and is never written here. shared_preferences holds the NON-secret
  # locale choice only. uuid mints the random (PII-free) device id +
  # Idempotency-Keys. These are platform plugins — they throw under
  # `flutter test`, so SecureTokenStore/LocaleStore inject their backing store and
  # tests pass in-memory fakes (never the real plugin).
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.5
  uuid: ^4.5.1
  # Referral-invite sharing (A3): hands the composed invite link to the platform
  # share sheet. No PII in the shared text — only the opaque invite code/link.
  share_plus: ^10.1.4
  # A2 voice capture (REAL): mic recording to a temp .m4a (AAC-LC), hard 120s
  # cap (RecordPackageVoiceRecorder). The storage-upload route now exists
  # (POST /voice/upload-url → signed PUT), so the record→storage_path leg is
  # un-blocked. `record` 6.x resolves CLEANLY on this toolchain: it pins
  # record_linux ^1.x, which implements record_platform_interface 1.6.0 — the
  # OLD Android-build breakage came from record 5.x pulling record_linux 0.7.2
  # against that same interface (see git history of this note). record 7.x
  # needs a newer Dart SDK than the repo toolchain (3.6), so we stay on ^6.2.1;
  # no dependency_overrides needed. Still OUT on purpose:
  #   - permission_handler — record's own hasPermission() covers the mic prompt.
  #   - path_provider — Directory.systemTemp IS the app-private cache dir on
  #     Android, which is all the recorder needs for its temp clip.
  record: ^6.2.1
  # ADR-0032 profile photo capture (camera + gallery). The picker's OWN
  # maxWidth/imageQuality params do the on-device resize + JPEG re-encode
  # (max 1024px), so NO separate compression package. Deliberately OUT
  # (mirrors the `record` decisions above):
  #   - permission_handler — the system photo picker (Android 13+) needs no
  #     permission, and the camera intent handles its own prompt.
  #   - flutter_image_compress — pickImage(maxWidth, imageQuality) covers it.
  image_picker: ^1.1.2
  # ADR-0032 — square-crop the picked photo BEFORE upload (a profile photo is a
  # face, not an arbitrary rectangle). Runs entirely ON DEVICE after the picker,
  # then re-encodes JPEG ≤1024px so the resize + minimization guarantee still
  # holds before any byte leaves the phone. Android uses the bundled uCrop
  # activity (declared in AndroidManifest.xml); iOS uses TOCropViewController via
  # the plugin's pod — no extra Info.plist keys beyond the camera/photos usage
  # strings image_picker already requires.
  image_cropper: ^9.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # Deterministic bloc/cubit state-sequence assertions + codegen-free mocks
  # (no build_runner) for repository unit tests.
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  fonts:
    # Data font — wages, IDs, OTP cells, counts. Self-hosted (real binaries)
    # so numbers render identically with no network. Sourced from the
    # BadaBhai Design System (docs/design/.../assets/fonts).
    - family: Roboto Mono
      fonts:
        - asset: assets/fonts/RobotoMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/RobotoMono-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/RobotoMono-Bold.ttf
          weight: 700
        - asset: assets/fonts/RobotoMono-BoldItalic.ttf
          weight: 700
          style: italic
    # #350 — Baloo 2 (display) + Mukta (body) are STILL runtime-fetched by
    # google_fonts because their binaries are not in the repo; a sideloaded or
    # 2G first launch therefore renders fallback glyphs and reflows mid-flow.
    # The declarations below are the asset plan, commented out because Flutter
    # fails the build on an `asset:` that does not exist. Land the six .ttf
    # files (Devanagari subset — exact list + weights + sources in
    # assets/fonts/README.md), uncomment this block, THEN flip
    # AppTypography.bundledBrandFonts to true — in that order, same commit.
    # - family: Baloo 2
    #   fonts:
    #     - asset: assets/fonts/Baloo2-SemiBold.ttf
    #       weight: 600
    #     - asset: assets/fonts/Baloo2-Bold.ttf
    #       weight: 700
    #     - asset: assets/fonts/Baloo2-ExtraBold.ttf
    #       weight: 800
    # - family: Mukta
    #   fonts:
    #     - asset: assets/fonts/Mukta-Regular.ttf
    #       weight: 400
    #     - asset: assets/fonts/Mukta-SemiBold.ttf
    #       weight: 600
    #     - asset: assets/fonts/Mukta-Bold.ttf
    #       weight: 700
