name: badabhai_worker_app
description: BadaBhai worker app (Phase 1 scaffold) — chat-first worker profiling.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  # Display (Baloo 2) + body (Mukta) of the "Desi Vernacular Pop" theme.
  # Both carry Devanagari for Hinglish/regional copy. Roboto Mono (data) is
  # self-hosted below so figures render identically offline.
  google_fonts: ^6.2.1
  # State management + DI for the feature-first / clean-architecture stack:
  # BLoC/Cubit for presentation, Equatable for immutable value states/models,
  # get_it as the composition-root service locator.
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  get_it: ^7.7.0
  # Declarative routing + the persistent 4-tab StatefulShellRoute shell
  # (ADR-0023). Replaces the Navigator-1.0 Map<String, WidgetBuilder> router.
  go_router: ^14.2.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # Deterministic bloc/cubit state-sequence assertions + codegen-free mocks
  # (no build_runner) for repository unit tests.
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  fonts:
    # Data font — wages, IDs, OTP cells, counts. Self-hosted (real binaries)
    # so numbers render identically with no network. Sourced from the
    # BadaBhai Design System (docs/design/.../assets/fonts).
    - family: Roboto Mono
      fonts:
        - asset: assets/fonts/RobotoMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/RobotoMono-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/RobotoMono-Bold.ttf
          weight: 700
        - asset: assets/fonts/RobotoMono-BoldItalic.ttf
          weight: 700
          style: italic
