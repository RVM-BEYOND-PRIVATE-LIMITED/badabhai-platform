plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
    // Firebase — google-services must be applied after Android/Kotlin/Flutter plugins.
    id "com.google.gms.google-services"
    // Crashlytics gradle plugin: uploads the mapping/NDK symbols on release so
    // obfuscated stack traces are readable in the console. Crashlytics itself
    // now ships via the FlutterFire firebase_crashlytics plugin.
    id "com.google.firebase.crashlytics"
}

android {
    namespace = "com.badabhai.payerapp"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.badabhai.payerapp"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        // Firebase Android SDK (BoM 33+/34+) needs minSdk 23; Flutter 3.35 default is 24. Use 24.
        minSdk = 24
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // Firebase BoM pins the NATIVE messaging SDK version. Crashlytics is now
    // owned by the FlutterFire firebase_crashlytics plugin (do NOT re-declare it
    // here — double-declaration causes version conflicts). Analytics + Perf were
    // removed: unused, and Perf is a known start-up ANR risk on low-end devices.
    implementation platform("com.google.firebase:firebase-bom:34.15.0")
    implementation "com.google.firebase:firebase-messaging"
}
