pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.9.1" apply false
    // Bumped 1.8.22 → 2.2.21: Firebase BoM 34.x ships play-services with Kotlin 2.2.0
    // metadata, unreadable by the old compiler. 2.2.x supports AGP 8.1 (range 7.3.1–8.10).
    id "org.jetbrains.kotlin.android" version "2.2.21" apply false
    // Firebase gradle plugins. Versions verified 2026-07-11 as latest stable,
    // compatible with AGP 8.1.0 / Gradle 8.3. Crashlytics v3 needs AGP 8.1+ & google-services 4.4.1+.
    // firebase-perf removed (unused + low-end start-up ANR risk).
    id "com.google.gms.google-services" version "4.5.0" apply false
    id "com.google.firebase.crashlytics" version "3.0.7" apply false
}

include ":app"
