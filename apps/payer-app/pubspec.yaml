name: payer_app
description: "BadaBhai Payer App (Company + Agency) — role-aware mobile app for the paying side."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.2
  # TD61: the widgets use Flutter 3.35 APIs (Switch.activeThumbColor,
  # DropdownButtonFormField.initialValue) — fail LOUD on an older SDK instead of
  # confusing no-named-parameter compile errors. CI pins 3.35.7 (payer-app.yml).
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  # Crash reporting (FlutterFire). firebase_core boots the SDK from the native
  # config files (android/app/google-services.json, ios GoogleService-Info.plist);
  # firebase_crashlytics is the sink for Dart/Flutter crashes — native Crashlytics
  # alone only sees JVM/NDK crashes, which Flutter code never produces. Init is
  # fail-closed (see core/observability/crash_reporter.dart) so a device that
  # cannot start Firebase keeps running normally. iOS SDK 11 → iOS 13 floor.
  # crashlytics PINNED EXACT: 5.2.5's artifact is broken (imports the long-removed
  # `FirebasePlugin` symbol → won't compile against firebase_core_platform_interface
  # 7.1.0); 5.2.4 is the last compiling build. A caret would re-pull 5.2.5.
  firebase_core: ^4.12.0
  firebase_crashlytics: 5.2.4
  # Display (Baloo 2) + body (Mukta) of the "Desi Vernacular Pop" theme.
  # Roboto Mono (data: ₹, IDs, phone) is self-hosted below so figures render
  # identically offline.
  google_fonts: ^6.2.1
  # State management + DI: BLoC/Cubit for presentation, Equatable for immutable
  # value states/models, get_it as the composition-root service locator.
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  get_it: ^7.7.0
  # Persistent auth seam (not exercised in PASS A — mock session only).
  flutter_secure_storage: ^9.2.4
  # Random PII-free ids / idempotency keys for future API binding.
  uuid: ^4.5.1
  # Client-side QR rendering for the agency referral link (no PII, no network).
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  fonts:
    # Data font — ₹, IDs, phone, counts. Self-hosted (real binaries) so numbers
    # render identically with no network. Sourced from the BadaBhai Design System.
    - family: Roboto Mono
      fonts:
        - asset: assets/fonts/RobotoMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/RobotoMono-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/RobotoMono-Bold.ttf
          weight: 700
        - asset: assets/fonts/RobotoMono-BoldItalic.ttf
          weight: 700
          style: italic
