name: payer_app
description: "BadaBhai Payer App (Company + Agency) — role-aware mobile app for the paying side."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.2
  # TD61: the widgets use Flutter 3.35 APIs (Switch.activeThumbColor,
  # DropdownButtonFormField.initialValue) — fail LOUD on an older SDK instead of
  # confusing no-named-parameter compile errors. CI pins 3.35.7 (payer-app.yml).
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  # Crash reporting (FlutterFire). firebase_core boots the SDK from the native
  # config files (android/app/google-services.json, ios GoogleService-Info.plist);
  # firebase_crashlytics is the sink for Dart/Flutter crashes — native Crashlytics
  # alone only sees JVM/NDK crashes, which Flutter code never produces. Init is
  # fail-closed (see core/observability/crash_reporter.dart) so a device that
  # cannot start Firebase keeps running normally. iOS SDK 11 → iOS 13 floor.
  # crashlytics PINNED EXACT: 5.2.5's artifact is broken (imports the long-removed
  # `FirebasePlugin` symbol → won't compile against firebase_core_platform_interface
  # 7.1.0); 5.2.4 is the last compiling build. A caret would re-pull 5.2.5.
  firebase_core: ^4.12.0
  firebase_crashlytics: 5.2.4
  # #350 — Baloo 2 + Mukta are now SELF-HOSTED under `fonts:` below (as Roboto
  # Mono already was), so nothing here fetches at runtime. google_fonts stays a
  # dependency only because core/theme/app_typography.dart keeps the pre-#350
  # fetch branch behind `bundledBrandFonts`, and because it owns
  # `GoogleFonts.config.allowRuntimeFetching`, which that file forces to false.
  google_fonts: ^6.2.1
  # State management + DI: BLoC/Cubit for presentation, Equatable for immutable
  # value states/models, get_it as the composition-root service locator.
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  get_it: ^7.7.0
  # Persistent auth seam (not exercised in PASS A — mock session only).
  flutter_secure_storage: ^9.2.4
  # Random PII-free ids / idempotency keys for future API binding.
  uuid: ^4.5.1
  # Client-side QR rendering for the agency referral link (no PII, no network).
  qr_flutter: ^4.1.0
  # #354 — opens the SIGNED masked-résumé URL straight in the OS browser
  # (LaunchMode.externalApplication). That url is a bearer capability: anyone
  # holding it can fetch the worker's résumé with NO BadaBhai auth. It used to be
  # written to the shared OS clipboard, which any focused app/IME can read, which
  # Gboard/Samsung/Windows Phone Link sync OFF-DEVICE, and which Android keeps in
  # clipboard history — so the token outlived the screen. Handing it to the
  # browser is a one-shot transfer with no persistent copy.
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  fonts:
    # Data font — ₹, IDs, phone, counts. Self-hosted (real binaries) so numbers
    # render identically with no network. Sourced from the BadaBhai Design System.
    - family: Roboto Mono
      fonts:
        - asset: assets/fonts/RobotoMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/RobotoMono-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/RobotoMono-Bold.ttf
          weight: 700
        - asset: assets/fonts/RobotoMono-BoldItalic.ttf
          weight: 700
          style: italic
    # #350 — Baloo 2 (display) + Mukta (body), the locked Desi Vernacular Pop
    # brand families, now SELF-HOSTED with their Devanagari subsets. They used
    # to be fetched over HTTP by google_fonts on first use, so a recruiter who
    # opened the app cold in a plant office or on a site visit got fallback
    # glyphs and a mid-flow reflow — on the OTP and post-job screens, under
    # their thumb — and the first launch handed the device's IP/UA to
    # fonts.gstatic.com for families we can simply carry.
    #
    # Baloo 2 upstream is VARIABLE-only (Baloo2[wght].ttf); these are static
    # instances cut from it at wght 600/700/800 with fontTools varLib.instancer,
    # so each weight is a real face rather than one variable file declared three
    # times. Mukta ships statics upstream and is used as-is. Both are SIL OFL
    # 1.1 — OFL-Baloo2.txt / OFL-Mukta.txt sit beside the binaries as the
    # licence requires for redistribution.
    #
    # Weights are exactly what this app's type scale asks for: Baloo 2 600/700/800
    # (titleMedium/titleLarge are 600, everything else 700/800) and Mukta
    # 400/600/700. The one exception is the error-text style in app_theme.dart,
    # which asks for w500 — Mukta has no 500 face upstream, so Flutter resolves
    # it to the nearest declared weight. That was equally true on the google_fonts
    # path, so bundling changes nothing about it.
    #
    # Cost: ~2.5MB of assets. Paid deliberately — a one-time APK cost beats a
    # per-install download that can simply fail on a factory-floor connection.
    - family: Baloo 2
      fonts:
        - asset: assets/fonts/Baloo2-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Baloo2-Bold.ttf
          weight: 700
        - asset: assets/fonts/Baloo2-ExtraBold.ttf
          weight: 800
    - family: Mukta
      fonts:
        - asset: assets/fonts/Mukta-Regular.ttf
          weight: 400
        - asset: assets/fonts/Mukta-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Mukta-Bold.ttf
          weight: 700
