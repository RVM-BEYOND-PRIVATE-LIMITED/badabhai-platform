# ===========================================================================
# docker-compose.staging.yml — CD-0 staging/deploy overlay for the Lightsail box.
#
# The base docker-compose.yml is a DEV-LAPTOP file on purpose (its api service
# pins NODE_ENV=development, public dev-default secrets, and the compose-internal
# postgres/redis) — NEVER deploy it alone. This overlay retargets the api AND the
# ai-service for a real box; apply it ON TOP of the base file:
#
#   docker compose -f docker-compose.yml -f docker-compose.staging.yml --profile api pull api ai-service
#   docker compose -f docker-compose.yml -f docker-compose.staging.yml --profile api up -d --no-deps ai-service
#   docker compose -f docker-compose.yml -f docker-compose.staging.yml --profile api up -d --no-deps api
#
# TD81(a): the ai-service is part of this overlay as of PR #431. Before that,
# NOTHING served the FastAPI app on the box — AI_SERVICE_URL resolved to nothing,
# the api degraded to its TypeScript mock, and /health still returned 200, so
# staging reported healthy while running AI entirely mocked. Both services are
# now pinned to their own IMMUTABLE per-commit image, and BOTH `${..IMAGE:?}`
# pins must be exported for ANY compose command against this overlay (compose
# interpolates the WHOLE file before it filters by service or profile) — so a
# manual/rollback run exports API_IMAGE **and** AI_SERVICE_IMAGE.
#
# Fail-loud contract: every `${VAR:?}` below errors at COMPOSE time (before any
# container starts) when the box lacks real values — a box still on the public
# repo-literal dev defaults is UNDEPLOYABLE instead of silently live on them.
# Values: on CI deploys they arrive from GitHub environment/repo secrets via the
# deploy step's env+envs passthrough (CD-1b) and ALWAYS shadow the box's shell/.env
# — even when empty (fail-loud either way). Manual/rollback runs from a box shell
# read the shell env or the project .env instead (STAGING-SECRETS-1); values are
# never committed (CLAUDE.md §6).
#
# depends_on: the base api service depends_on the compose-internal postgres and
# redis. An overlay cannot DELETE a depends_on entry by omission (compose merges
# maps by union), and the `!reset` YAML tag needs compose >= 2.24, which the box
# is NOT verified to run — so the deploy script passes `--no-deps api` on `up`
# instead (portable across all compose v2), which skips dependency startup
# entirely. NEVER run this overlay with a bare `up -d`: profile-less services
# (postgres/redis/adminer) would still start alongside the api. (The ai-service
# declares NO depends_on at all — it is DB-free and its spend ledger is lazy —
# so `--no-deps` costs it nothing; it is kept for one uniform discipline.)
# ===========================================================================
services:
  api:
    # CD-4: staging pins the IMMUTABLE per-commit image (the ghcr `sha-<short7>`
    # tag) exported by the deploy-lightsail job; rollback = export the previous
    # sha tag and re-run `up` (docs/rollback-guide.md). The dev path keeps the
    # base file's `${API_IMAGE:-badabhai-api:latest}` default.
    image: ${API_IMAGE:?set the immutable ghcr sha tag, e.g. ghcr.io/<owner>/badabhai-platform/badabhai-api:sha-<short7> — exported by deploy-lightsail in .github/workflows/ci.yml}
    environment:
      # Explicit production, not merely un-set: the base file pins development and
      # the runtime image's own default is ALSO production (apps/api/Dockerfile,
      # `ENV NODE_ENV=production`) — stating it here makes the deployed value
      # independent of merge/default order, and it ARMS every fail-closed boot
      # assert in apps/api/src/main.ts (assertPiiCryptoConfig / assertAuthConfig /
      # assertPayerAuthConfig / assertAdminAuthConfig all reject the public
      # dev-default secrets outside an explicit development/test env).
      NODE_ENV: production

      # ---- Secrets the production boot asserts REQUIRE (fail-closed in main.ts).
      # `${VAR:?}` fails at compose time — one clear error line beats a container
      # crash-loop. Real values live only on the box (env / .env), never in git.
      JWT_SECRET: ${JWT_SECRET:?required in staging — the dev default is a public repo literal}
      PII_ENCRYPTION_KEY: ${PII_ENCRYPTION_KEY:?required in staging — 32-byte base64, never the dev default}
      PII_HASH_PEPPER: ${PII_HASH_PEPPER:?required in staging — never the dev default}
      # assertAuthConfig also rejects the dev PIN pepper outside dev/test (ADR-0026
      # Phase 3) — omitting this would guarantee a boot loop under NODE_ENV=production.
      PIN_PEPPER: ${PIN_PEPPER:?required in staging — never the dev default}
      # Must ALSO differ from JWT_SECRET (assertAdminAuthConfig — principal separation).
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:?required in staging — distinct from JWT_SECRET, never the dev default}

      # ---- Real backing services.
      # Postgres: NEVER the compose-internal one — the deploy runs `up --no-deps api`
      # so it never even starts on this path; DATABASE_URL is the real (Supabase) DB.
      DATABASE_URL: ${DATABASE_URL:?required in staging — the real Postgres, never the compose-internal one}
      # Redis: box-local BY DECISION (CD-1a, owner) — it IS this compose project's
      # `redis` service, started explicitly by the deploy script before the api (see
      # .github/workflows/ci.yml), reached over the compose network. So REDIS_URL
      # must be `redis://redis:6379`: NOT localhost (inside the api container that is
      # the api itself) and NOT the host port (loopback-bound in docker-compose.yml).
      # Still `${VAR:?}` — the value stays a secret, and an unset one must fail loud.
      REDIS_URL: ${REDIS_URL:?required in staging — box-local redis over the compose network, i.e. redis://redis:6379}

      # ---- Worker OTP is REAL-ONLY (Fast2SMS — no console/mock path, CLAUDE.md §1).
      # The base file's dev-dummy defaults satisfy assertAuthConfig's presence check
      # (so the container would BOOT) but every real OTP send would then fail at
      # runtime — staging requires the REAL provider values, and a missing one fails
      # here at compose rather than as a mid-login provider error.
      FAST2SMS_API_KEY: ${FAST2SMS_API_KEY:?required in staging — real Fast2SMS key, worker OTP has no mock path}
      FAST2SMS_SENDER_ID: ${FAST2SMS_SENDER_ID:?required in staging — the DLT-registered sender id}
      FAST2SMS_DLT_TEMPLATE_ID: ${FAST2SMS_DLT_TEMPLATE_ID:?required in staging — the DLT template id}

      # ---- InternalServiceGuard shared secret. The base default ("dev-internal-token")
      # is a repo literal guarding the ops-only routes (resume reads, ops unlocks —
      # TD33/TD50) and has NO boot assert — this compose-level requirement is the only
      # fail-loud gate for it.
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?required in staging — the dev default is a public repo literal}
      # ---- TD81(a): point the api at the ai-service container, over the compose
      # network. THIS LINE IS THE POINT OF THE WHOLE TICKET: without it the schema
      # default http://localhost:8000 (packages/config/src/server.ts) resolves
      # INSIDE the api container to the api itself, every AI call fails, and the
      # API falls back to its safe TypeScript mock (real_call=false) — a SOFT
      # failure that keeps /health at 200, so the box reported healthy while
      # profiling/extraction ran entirely mocked and nobody was told.
      #
      # A LITERAL, not `${VAR:?}`: this is not a secret and there is exactly one
      # correct value on this box — the compose service name. Making it a required
      # secret would add a way to get it wrong (and a way to fail a deploy) with
      # nothing to gain. `ai-service` resolves only over the compose network;
      # neither localhost nor the loopback-published host port would work from
      # inside the api container.
      AI_SERVICE_URL: http://ai-service:8000
      # TD72(a): outside dev an EMPTY CORS list resolves to deny-all (origin:false)
      # with no boot assert — the first otherwise-green deploy would silently block
      # every payer-web/ops browser call while /health (no CORS) reports healthy.
      # Fail loud at compose time instead.
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?required in staging — empty means deny-all for browsers (TD72a)}

      # ---- Resume PDF render: explicitly OFF on this box (R27 owner queue). The base
      # file enables it for the local render runbook, but its SUPABASE_URL /
      # SUPABASE_SERVICE_ROLE_KEY default to EMPTY — with render left on, the resume
      # PDF (a Phase-1 exit criterion) would boot fine and then fail at the FIRST
      # render at runtime ("Supabase Storage is not configured"). Off-until-configured
      # is the honest state. When the box gets storage creds, flip this to "true" AND
      # add SUPABASE_URL + SUPABASE_SERVICE_ROLE_KEY here as `${VAR:?}` fail-loud
      # entries (deliberately NOT added today — keeping the required-secret set equal
      # to the owner's STAGING-SECRETS-1 list).
      #
      # KEPT "false" (PR #405 review): that PR flipped this to "true" WITHOUT adding the
      # two storage entries the precondition above requires, which would have armed the
      # render against unconfigured storage — a green boot followed by a runtime throw at
      # the first render, exactly what this flag exists to prevent. Verified at the time:
      # this compose file declares no SUPABASE_* entry and no env_file, and no workflow
      # injects them. Flip it in the SAME change that adds the creds, not before.
      RESUME_RENDER_ENABLED: "false"

      # ---- KNOWN-SURVIVING DEV VALUE (deliberate for now — R27 owner queue). The base
      # file's `PAYER_LOGIN_METHOD: whatsapp` survives this merge, and the WhatsApp
      # channel is the MOCK provider (ADR-0020) — so payer/agency login is functionally
      # DEAD on this box even though the API boots clean in production mode. NOT
      # silently overridden here: the owner decides whether to pin a real method +
      # its creds (e.g. email_otp -> ZeptoMail set as `${VAR:?}`) or accept a dead
      # payer login on this box for now.

  # ---- TD81(a): the FastAPI AI service, ON THE BOX ----
  # The base file's ai-service is the dev-laptop form (a `:latest` local build).
  # This retargets it exactly the way the api above is retargeted: an IMMUTABLE
  # per-commit image, real-call gate still OFF, credentials pass-through only.
  #
  # Everything else it needs it already has from the base file and is NOT
  # overridden here: the loopback-only `127.0.0.1:8000:8000` publish (CD-1a — this
  # is an UNAUTHENTICATED AI surface while TD67's token is unset, so it must never
  # be reachable off-box; a base `ports` entry cannot be removed by an overlay
  # anyway, which is why the safe bind lives there), `restart: unless-stopped`, and
  # the absence of any depends_on.
  #
  # It carries NO `${VAR:?}` secret requirements ON PURPOSE — the required-secret
  # set for this box stays exactly the owner's STAGING-SECRETS-1 list (the same
  # discipline that keeps SUPABASE_* out of the api block above). This service has
  # no fail-closed boot assert to satisfy: with no keys it boots, serves the
  # pseudonymization gateway, and answers every AI route from the MOCK path — which
  # is the correct, committed posture (CLAUDE.md §2 invariant 5). What changes with
  # this file is that the mock now runs where the api can SEE it, so `real_call`
  # and the ai-service's own /health become observable instead of imaginary.
  ai-service:
    # CD-4, mirroring the api: pin the IMMUTABLE per-commit ghcr `sha-<short7>`
    # tag exported by deploy-lightsail; rollback = export the previous sha tag and
    # re-run `up` (docs/rollback-guide.md — which must now export BOTH image vars).
    # `${VAR:?}` fails at COMPOSE time, before any container starts.
    image: ${AI_SERVICE_IMAGE:?set the immutable ghcr sha tag, e.g. ghcr.io/<owner>/badabhai-platform/badabhai-ai-service:sha-<short7> — exported by deploy-lightsail in .github/workflows/ci.yml}
    environment:
      # ---- CLAUDE.md §2 INVARIANT 5, RESTATED ON THE DEPLOYED SURFACE: real LLM
      # calls are GATED AND OFF BY DEFAULT. "false" is stated EXPLICITLY here — not
      # merely inherited from the base file and not merely left to config.py's
      # default — for the same reason NODE_ENV is restated on the api above: the
      # deployed value must not depend on merge or default order, and the one flag
      # that spends real money and sends real (pseudonymized) text to a provider is
      # the last place to rely on an implicit default.
      #
      # Flipping this is an OWNER / §7 decision, made in the box's environment (or
      # the staging environment secrets), NEVER in a committed file — and it takes
      # BOTH this flag and GEMINI_FLASH_API_KEY, plus the runbook's staged rollout
      # (docs/ai/enable-real-llm-extraction.md: AI_REAL_CALL_TASKS=profile_extraction
      # first). Until then every route answers from the mock path.
      AI_ENABLE_REAL_CALLS: "false"

      # ---- Provider credentials: PASS-THROUGH, never committed, never required.
      # Declared so the owner can supply them from the box env / environment
      # secrets with NO code change; empty until then. `:-` is safe for these two
      # (both are `str | None` with no length constraint, and "" is falsy — it
      # reads as "not configured", so real_calls_blocked_reason still returns
      # "GEMINI_FLASH_API_KEY is not set" and the mock path holds).
      # NOTE: supplying a key ALONE arms nothing — the flag above still gates it.
      GEMINI_FLASH_API_KEY: ${GEMINI_FLASH_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

      # ---- TD27 shared spend ledger. Unset = the in-process backend, which is
      # exact (not approximate) here because the image runs ONE uvicorn worker.
      # It MUST be set — to the box-local redis, i.e. redis://redis:6379/0, which
      # is already running for the api (CD-1a) — BEFORE either the worker count
      # rises or AI_ENABLE_REAL_CALLS is flipped, or the daily/per-user INR caps
      # stop being global. Fail-closed by design: set-but-unreachable BLOCKS real
      # calls (falls back to mock); it never permits an unverifiable spend.
      # The name is AI_SPEND_REDIS_URL, NOT REDIS_URL (AI-ENV-1) — the api's
      # REDIS_URL is a different, mandatory store and cannot reach these Settings.
      AI_SPEND_REDIS_URL: ${AI_SPEND_REDIS_URL:-}

      # ---- TD67 service token. Inherited VALUELESS (compose pass-through form)
      # from the base file for BOTH this service and the api, which is what makes
      # the flip a pure env action on the box: export AI_INTERNAL_TOKEN (>= 16
      # chars) there, re-run the deploy, and both containers pick it up together.
      # It is deliberately NOT threaded through the CI deploy's env/envs
      # passthrough: an UNSET GitHub secret expands to an EMPTY STRING, and empty
      # is FATAL on both sides (Zod .min(16) / pydantic min_length=16 both reject
      # ""), so a not-yet-created secret would crash-loop the api too. Add it to
      # ci.yml in the SAME change that creates the secret, or arm it from the box.
      # Half-flipping it (one side only) 401s every api→ai call and silently
      # degrades the API to mock — TD81's own failure class, re-created.
