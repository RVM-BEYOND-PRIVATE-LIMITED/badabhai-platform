# Dependabot — keep GitHub Actions on Node-24 majors automatically (CI-1).
# Scope is intentionally github-actions ONLY (per the CI-1 ask); npm/pip ecosystems
# are a separate future decision. Weekly PRs bump any action whose major falls behind,
# so the Node-runtime deprecation warnings never recur.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # TD96 (owner ruling 2026-07-21, PR #473 closed): stay on ssh-action v1.0.3.
      # v1.1.0+ is a composite that curl-downloads the drone-ssh binary at deploy
      # time with no checksum — a SHA pin no longer covers the executed code, and
      # this step carries the 12 production deploy secrets (ci.yml "Deploy via SSH").
      # Remove this ignore only with an owner decision recorded in the tech-debt
      # register (e.g. vendoring the action or upstream adding checksum verification).
      - dependency-name: "appleboy/ssh-action"
        update-types:
          ["version-update:semver-major", "version-update:semver-minor"]
