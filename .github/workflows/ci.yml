name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- TypeScript monorepo: lint, typecheck, test, build ----
  node:
    name: Node (lint / typecheck / test / build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        # No `version:` here on purpose — it would conflict with the
        # `packageManager` field in package.json (ERR_PNPM_BAD_PM_VERSION).
        # package.json's `packageManager: pnpm@11.5.2` is the single source.
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # CI-5b: persist turbo's local task cache across runs. turbo@^2.3.3 (v2,
      # resolves 2.9.x) writes its cache to `.turbo/cache` under the repo root —
      # turbo.json sets no `cacheDir` override — so caching `.turbo` captures it.
      # The sha key saves a fresh entry per run; `restore-keys` gives every run the
      # most recent prior cache. This accelerates the turbo-run tasks below
      # (typecheck / test / build — `pnpm lint` is plain eslint, not turbo). No CI
      # invocation passes `--force` or sets TURBO_FORCE, so restored entries are
      # actually consumed. Nothing secret-bearing is cached: `.turbo` holds task
      # outputs (dist/, .next/) and task logs only.
      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-

      - name: Lint
        run: pnpm lint

      # Design-system adherence (DS4.3): the token gate — NO raw hex/px in payer-web UI
      # source — is enforced by the Lint step above (ESLint `no-restricted-syntax`, since
      # oxlint does not implement that rule). This is the fast oxlint supplementary pass
      # (correctness) over apps/payer-web/src. Any payer-web UI change should also run the
      # `bb-ui-review` skill (see the PR checklist).
      - name: Design-system adherence — oxlint (payer-web)
        run: pnpm lint:oxlint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # Offline self-test for the staging /health + mock-OTP smoke (scripts/staging-smoke.mjs).
      # Plain node:test, NO network — locks the load-bearing dev_otp-FAIL gate + the
      # no-secret-leak guarantee so a refactor can't silently weaken them.
      - name: Smoke self-test (staging)
        run: node --test scripts/staging-smoke.test.mjs

      - name: Build
        run: pnpm build

  # ---- Python AI service: pytest + ruff ----
  ai-service:
    name: AI service (pytest / ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ai-service
    steps:
      - uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          # CI-5a: cache pip's package cache. The job installs requirements-dev.txt,
          # which chains `-r requirements.txt` — so the key must hash BOTH files
          # (a runtime-deps change alone must rotate the key, or actions/cache
          # never re-saves on a hit and new wheels re-download every run). NOTE:
          # `cache-dependency-path` is ALWAYS repo-root-relative — the job's
          # `working-directory` default does not apply to it — hence the full path.
          cache: "pip"
          cache-dependency-path: apps/ai-service/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest

  # ---- Flutter worker app ----
  # Moved to its own path-filtered, BLOCKING workflow: .github/workflows/worker-app.yml
  # (runs only on changes under apps/worker-app; pinned Flutter; no continue-on-error).

  # ---- Phase 1 E2E gate: real Postgres + Redis, migrate, drive the full flow ----
  # Blocking: a PR FAILS if the end-to-end onboarding journey (login → consent →
  # multi-turn interview → state persistence → AUTO extraction → extraction_completed
  # → AI-metadata persistence → no-raw-phone → confirm → resume) regresses.
  # The FastAPI AI service is intentionally NOT started — the API falls back to its
  # safe mock (real_call=false), so the flow + its events/metadata complete offline.
  e2e:
    name: E2E (Phase 1 onboarding flow)
    runs-on: ubuntu-latest
    services:
      postgres:
        # pgvector-enabled pg16 (official image, built on postgres:16): the migration
        # chain runs `CREATE EXTENSION vector` (0001 — worker_profiles.embedding + HNSW),
        # which a plain postgres:16 image cannot satisfy ("extension vector is not available").
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: badabhai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      # Service-container Postgres/Redis (no special chars → no URL-encoding needed).
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/badabhai_test
      REDIS_URL: redis://localhost:6379
      # test → PII crypto guard permits the dev defaults (no real secrets in CI).
      NODE_ENV: test
      API_PORT: "3001"
      RUN_E2E: "1"
      # The per-IP OTP cap (OTP_MAX_SENDS_PER_HOUR, default 5) is also applied per
      # egress IP. Every e2e test logs in via mock OTP from the SAME CI IP, so the whole
      # suite shares one hourly budget — raise it here so the cap (a production abuse
      # backstop, meaningless for a single shared CI IP) doesn't 429 the suite. Real
      # deployments keep the default; this only affects the CI e2e job.
      OTP_MAX_SENDS_PER_HOUR: "1000"
      # Same reasoning for the per-phone DAILY backstop (TD60): one CI run shares
      # phones/IPs across the whole suite, so keep it out of the way here too.
      OTP_MAX_SENDS_PER_DAY: "1000"
      # Shared secret for InternalServiceGuard on the ops/backend-only resume routes
      # (GET /resume/:id, …). Job-level so the API process AND the e2e test both see it;
      # the test sends it as x-internal-service-token.
      INTERNAL_SERVICE_TOKEN: e2e-internal-service-token
      # OTP is REAL-ONLY (Fast2SMS for worker SMS, ZeptoMail for payer email). The API now
      # calls assertAuthConfig (Fast2SMS creds REQUIRED in every env) + assertPayerAuthConfig
      # (default email_otp + zeptomail → email creds REQUIRED) at boot, so it FAILS CLOSED
      # without these. Supply obviously-FAKE placeholders so the process BOOTS — no real send
      # ever happens (the e2e never reaches a real provider; the dev_otp login path is gone,
      # so the OTP-login journeys are .skip). NEVER real keys.
      FAST2SMS_API_KEY: ci-dummy-fast2sms-api-key
      FAST2SMS_SENDER_ID: CIDUMMY
      FAST2SMS_DLT_TEMPLATE_ID: ci-dummy-dlt-template
      ZEPTOMAIL_API_TOKEN: ci-dummy-zeptomail-token
      ZEPTOMAIL_MAIL_AGENT: ci-dummy-mail-agent
      EMAIL_FROM_ADDRESS: ci-dummy@example.test
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build only the API and its workspace deps — not the whole monorepo (the
      # `node` job owns lint/typecheck/unit-test/full-build; we just need a runnable API).
      - name: Build API (+ workspace deps)
        run: pnpm --filter "@badabhai/api..." build

      # Migrations 0003/0004 REVOKE grants from Supabase's anon/authenticated/
      # service_role roles, which don't exist on a plain Postgres image. Pre-create
      # them (idempotent) so the migration chain applies — and so the RLS regression
      # test can exercise `SET ROLE anon/...` denials.
      - name: Create Supabase-compatible roles
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c 'DO $$ BEGIN CREATE ROLE anon NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$; DO $$ BEGIN CREATE ROLE authenticated NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$; DO $$ BEGIN CREATE ROLE service_role NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$;'

      # Fresh DB → applies the full migration chain from scratch, which also
      # validates migrations on every PR. The onboarding flow self-seeds (it creates
      # its own worker per run via a unique phone), so no worker seed is needed.
      - name: Apply migrations
        run: pnpm --filter @badabhai/db db:migrate

      # Catalog jobs ARE needed: the alpha swipe-to-apply e2e (ADR-0009) reads a
      # seeded job source. Idempotent; PII-free; safe to run before every e2e.
      - name: Seed alpha jobs
        run: pnpm --filter @badabhai/db db:seed:jobs

      - name: Start API and run the Phase 1 E2E suite
        run: |
          node apps/api/dist/main.js > api.log 2>&1 &
          API_PID=$!
          echo "API started (pid $API_PID) — waiting for /health…"
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3001/health >/dev/null 2>&1; then
              echo "API healthy after ${i}s"; break
            fi
            if ! kill -0 "$API_PID" 2>/dev/null; then
              echo "::error::API process exited during startup"; cat api.log; exit 1
            fi
            sleep 1
          done
          curl -sf http://localhost:3001/health >/dev/null \
            || { echo "::error::API never became healthy"; cat api.log; exit 1; }

          set +e
          pnpm --filter @badabhai/e2e test
          E2E_EXIT=$?
          set -e

          echo "----- API log (tail) -----"; tail -n 80 api.log || true
          kill "$API_PID" 2>/dev/null || true
          exit $E2E_EXIT

  # ---- Build and Push Docker Image ----
  build-and-push-image:
    name: Build & Push Docker Image
    needs: [node, ai-service, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/badabhai-api
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ---- AWS Lightsail Deployment ----
  deploy-lightsail:
    name: Deploy to AWS Lightsail
    needs: [build-and-push-image]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          timeout: 10m
          script: |
            echo "Starting deployment..."
            cd ~/deployments/badabhai-platform
            echo "Pulling latest code from main..."
            git pull origin main
            echo "Logging into GHCR..."
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            echo "Pulling and starting Docker containers..."
            export API_IMAGE=$(echo "ghcr.io/${{ github.repository }}/badabhai-api:main" | tr '[:upper:]' '[:lower:]')
            docker compose --profile api pull api
            docker compose --profile api up -d
            docker compose --profile api ps
            echo "Deployment finished successfully!"
