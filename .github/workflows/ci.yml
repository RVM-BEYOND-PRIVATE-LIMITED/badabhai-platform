name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- TypeScript monorepo: lint, typecheck, test, build ----
  node:
    name: Node (lint / typecheck / test / build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        # No `version:` here on purpose — it would conflict with the
        # `packageManager` field in package.json (ERR_PNPM_BAD_PM_VERSION).
        # package.json's `packageManager: pnpm@11.5.2` is the single source.
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # CI-5b: persist turbo's local task cache across runs. turbo@^2.3.3 (v2,
      # resolves 2.9.x) writes its cache to `.turbo/cache` under the repo root —
      # turbo.json sets no `cacheDir` override — so caching `.turbo` captures it.
      # The sha key saves a fresh entry per run; `restore-keys` gives every run the
      # most recent prior cache. This accelerates the turbo-run tasks below
      # (typecheck / test / build — `pnpm lint` is plain eslint, not turbo). No CI
      # invocation passes `--force` or sets TURBO_FORCE, so restored entries are
      # actually consumed. Nothing secret-bearing is cached: `.turbo` holds task
      # outputs (dist/, .next/) and task logs only.
      - name: Cache turbo
        # v6 is the latest major (v6.1.0 at time of writing) and matches this repo's
        # latest-major convention for actions/* (checkout@v7, setup-node@v7). v4 ran on
        # the deprecated node20 runtime — that annotation is what this bump clears.
        # (v5 = node24 runtime, v6 = ESM migration; both fine on GitHub-hosted runners.)
        uses: actions/cache@v6
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-

      - name: Lint
        run: pnpm lint

      # Design-system adherence (DS4.3): the token gate — NO raw hex/px in payer-web UI
      # source — is enforced by the Lint step above (ESLint `no-restricted-syntax`, since
      # oxlint does not implement that rule). This is the fast oxlint supplementary pass
      # (correctness) over apps/payer-web/src. Any payer-web UI change should also run the
      # `bb-ui-review` skill (see the PR checklist).
      - name: Design-system adherence — oxlint (payer-web)
        run: pnpm lint:oxlint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # Offline self-test for the staging /health + mock-OTP smoke (scripts/staging-smoke.mjs).
      # Plain node:test, NO network — locks the load-bearing dev_otp-FAIL gate + the
      # no-secret-leak guarantee so a refactor can't silently weaken them.
      - name: Smoke self-test (staging)
        run: node --test scripts/staging-smoke.test.mjs

      - name: Build
        run: pnpm build

  # ---- Python AI service: pytest + ruff ----
  ai-service:
    name: AI service (pytest / ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ai-service
    steps:
      - uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          # CI-5a: cache pip's package cache. The job installs requirements-dev.txt,
          # which chains `-r requirements.txt` — so the key must hash BOTH files
          # (a runtime-deps change alone must rotate the key, or actions/cache
          # never re-saves on a hit and new wheels re-download every run). NOTE:
          # `cache-dependency-path` is ALWAYS repo-root-relative — the job's
          # `working-directory` default does not apply to it — hence the full path.
          cache: "pip"
          cache-dependency-path: apps/ai-service/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest

  # ---- Flutter worker app ----
  # Moved to its own path-filtered, BLOCKING workflow: .github/workflows/worker-app.yml
  # (runs only on changes under apps/worker-app; pinned Flutter; no continue-on-error).

  # ---- Phase 1 E2E gate: real Postgres + Redis, migrate, drive the full flow ----
  # Blocking: a PR FAILS if the end-to-end onboarding journey (login → consent →
  # multi-turn interview → state persistence → AUTO extraction → extraction_completed
  # → AI-metadata persistence → no-raw-phone → confirm → resume) regresses.
  # The FastAPI AI service is intentionally NOT started — the API falls back to its
  # safe mock (real_call=false), so the flow + its events/metadata complete offline.
  e2e:
    name: E2E (Phase 1 onboarding flow)
    runs-on: ubuntu-latest
    services:
      postgres:
        # pgvector-enabled pg16 (official image, built on postgres:16): the migration
        # chain runs `CREATE EXTENSION vector` (0001 — worker_profiles.embedding + HNSW),
        # which a plain postgres:16 image cannot satisfy ("extension vector is not available").
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: badabhai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      # Service-container Postgres/Redis (no special chars → no URL-encoding needed).
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/badabhai_test
      REDIS_URL: redis://localhost:6379
      # test → PII crypto guard permits the dev defaults (no real secrets in CI).
      NODE_ENV: test
      API_PORT: "3001"
      RUN_E2E: "1"
      # The per-IP OTP cap (OTP_MAX_SENDS_PER_HOUR, default 5) is also applied per
      # egress IP. Every e2e test logs in via mock OTP from the SAME CI IP, so the whole
      # suite shares one hourly budget — raise it here so the cap (a production abuse
      # backstop, meaningless for a single shared CI IP) doesn't 429 the suite. Real
      # deployments keep the default; this only affects the CI e2e job.
      OTP_MAX_SENDS_PER_HOUR: "1000"
      # Same reasoning for the per-phone DAILY backstop (TD60): one CI run shares
      # phones/IPs across the whole suite, so keep it out of the way here too.
      OTP_MAX_SENDS_PER_DAY: "1000"
      # Shared secret for InternalServiceGuard on the ops/backend-only resume routes
      # (GET /resume/:id, …). Job-level so the API process AND the e2e test both see it;
      # the test sends it as x-internal-service-token.
      INTERNAL_SERVICE_TOKEN: e2e-internal-service-token
      # OTP is REAL-ONLY (Fast2SMS for worker SMS, ZeptoMail for payer email). The API now
      # calls assertAuthConfig (Fast2SMS creds REQUIRED in every env) + assertPayerAuthConfig
      # (default email_otp + zeptomail → email creds REQUIRED) at boot, so it FAILS CLOSED
      # without these. Supply obviously-FAKE placeholders so the process BOOTS — no real send
      # ever happens (the e2e never reaches a real provider; the dev_otp login path is gone,
      # so the OTP-login journeys are .skip). NEVER real keys.
      FAST2SMS_API_KEY: ci-dummy-fast2sms-api-key
      FAST2SMS_SENDER_ID: CIDUMMY
      FAST2SMS_DLT_TEMPLATE_ID: ci-dummy-dlt-template
      ZEPTOMAIL_API_TOKEN: ci-dummy-zeptomail-token
      ZEPTOMAIL_MAIL_AGENT: ci-dummy-mail-agent
      EMAIL_FROM_ADDRESS: ci-dummy@example.test
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build only the API and its workspace deps — not the whole monorepo (the
      # `node` job owns lint/typecheck/unit-test/full-build; we just need a runnable API).
      - name: Build API (+ workspace deps)
        run: pnpm --filter "@badabhai/api..." build

      # Migrations 0003/0004 REVOKE grants from Supabase's anon/authenticated/
      # service_role roles, which don't exist on a plain Postgres image. Pre-create
      # them (idempotent) so the migration chain applies — and so the RLS regression
      # test can exercise `SET ROLE anon/...` denials.
      - name: Create Supabase-compatible roles
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c 'DO $$ BEGIN CREATE ROLE anon NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$; DO $$ BEGIN CREATE ROLE authenticated NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$; DO $$ BEGIN CREATE ROLE service_role NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$;'

      # Fresh DB → applies the full migration chain from scratch, which also
      # validates migrations on every PR. The onboarding flow self-seeds (it creates
      # its own worker per run via a unique phone), so no worker seed is needed.
      - name: Apply migrations
        run: pnpm --filter @badabhai/db db:migrate

      # Catalog jobs ARE needed: the alpha swipe-to-apply e2e (ADR-0009) reads a
      # seeded job source. Idempotent; PII-free; safe to run before every e2e.
      - name: Seed alpha jobs
        run: pnpm --filter @badabhai/db db:seed:jobs

      - name: Start API and run the Phase 1 E2E suite
        run: |
          node apps/api/dist/main.js > api.log 2>&1 &
          API_PID=$!
          echo "API started (pid $API_PID) — waiting for /health…"
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3001/health >/dev/null 2>&1; then
              echo "API healthy after ${i}s"; break
            fi
            if ! kill -0 "$API_PID" 2>/dev/null; then
              echo "::error::API process exited during startup"; cat api.log; exit 1
            fi
            sleep 1
          done
          curl -sf http://localhost:3001/health >/dev/null \
            || { echo "::error::API never became healthy"; cat api.log; exit 1; }

          set +e
          pnpm --filter @badabhai/e2e test
          E2E_EXIT=$?
          set -e

          echo "----- API log (tail) -----"; tail -n 80 api.log || true
          kill "$API_PID" 2>/dev/null || true
          exit $E2E_EXIT

  # ---- Build and Push Docker Image ----
  build-and-push-image:
    name: Build & Push Docker Image
    needs: [node, ai-service, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      
      - name: Set up Docker Buildx
        # REQUIRED for CD-5: the runner's stock `docker` driver CANNOT export a
        # `type=gha` cache — buildx hard-errors before the build starts. This
        # action configures the docker-container driver, which can.
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        env:
          # CD-4: pin the short-sha length so the `type=sha` tag provably matches the
          # deploy job's `cut -c1-7` below (7 IS metadata-action's default — pinned
          # against upstream drift; harmless on versions predating the env var).
          DOCKER_METADATA_SHORT_SHA_LENGTH: "7"
        with:
          images: ghcr.io/${{ github.repository }}/badabhai-api
          # CD-4: declaring `tags:` replaces ALL metadata-action defaults, so the
          # previously-implicit branch behavior is now declared explicitly:
          #   type=ref,event=branch -> the mutable :main tag (humans / local pulls)
          #   type=sha              -> the IMMUTABLE :sha-<short7> tag (default
          #                            prefix "sha-", format=short) that the deploy
          #                            pins. Rollback = API_IMAGE=...:sha-<prev> +
          #                            compose up (docs/rollback-guide.md).
          tags: |
            type=ref,event=branch
            type=sha
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # CD-5: GitHub Actions layer cache (needs the buildx docker-container
          # driver set up above). The expensive layer is the runtime stage's
          # WeasyPrint apt+pip install (Pango/cairo native stack in
          # apps/api/Dockerfile) — the gha cache holds it across runs (10 GB
          # Actions Cache quota, separate from the Packages quota). mode=max also
          # caches intermediate (builder) stages — NOTE: the builder stage churns
          # multi-GB per run (full monorepo + node_modules), so if the 10 GB quota
          # starts evicting the turbo/pip caches (CI-5), drop to mode=min: it
          # caches final-image layers only, which STILL keeps the WeasyPrint
          # apt+pip layer (it lives in the final runtime stage).
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- AWS Lightsail Deployment ----
  deploy-lightsail:
    name: Deploy to AWS Lightsail
    needs: [build-and-push-image]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # CD-1: the job token needs packages:read so the BOX can docker-login with the
    # ephemeral GITHUB_TOKEN below (only one permissions: block existed in this file
    # — the build job's — so this job inherited the repo default, which may exclude
    # packages). contents:read is the safe floor.
    permissions:
      contents: read
      packages: read
    # CD-1 / Gate D1: scopes environment secrets + makes the deploy target explicit
    # in the Actions UI. Named "staging" per the current D1 default — if the owner
    # rules this box is PRODUCTION, rename AND add a required reviewer to the
    # environment (protection rules; repo is now PUBLIC so they are available on Free).
    environment: staging
    steps:
      - name: Deploy via SSH
        # SHA-pinned (was the mutable v1.0.3 tag): 12 production secrets now flow
        # through this action's container — a hijacked tag would see them all.
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
        # CD-1b: the docker-compose.staging.yml `${VAR:?}` gate reads the BOX's
        # shell environment — GitHub environment/repo secrets do NOT reach it on
        # their own (the first health-gated run proved it: INTERNAL_SERVICE_TOKEN
        # was SET as an environment secret yet compose failed "missing a value").
        # This env + `envs:` pair is the bridge: each var resolves environment-
        # scoped secret first, repo secret as fallback, and drone-ssh exports the
        # names listed in `envs:` into the remote session. Values never print —
        # compose reads them from the environment and the script never echoes them.
        # WARNING: NEVER add `debug: true` (prints the export lines WITH values, and the
        # quote-escaping defeats Actions masking) or `allenvs: true` (would export
        # INPUT_KEY — the SSH private key — into the remote session).
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PII_ENCRYPTION_KEY: ${{ secrets.PII_ENCRYPTION_KEY }}
          PII_HASH_PEPPER: ${{ secrets.PII_HASH_PEPPER }}
          PIN_PEPPER: ${{ secrets.PIN_PEPPER }}
          ADMIN_JWT_SECRET: ${{ secrets.ADMIN_JWT_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          INTERNAL_SERVICE_TOKEN: ${{ secrets.INTERNAL_SERVICE_TOKEN }}
          FAST2SMS_API_KEY: ${{ secrets.FAST2SMS_API_KEY }}
          FAST2SMS_SENDER_ID: ${{ secrets.FAST2SMS_SENDER_ID }}
          FAST2SMS_DLT_TEMPLATE_ID: ${{ secrets.FAST2SMS_DLT_TEMPLATE_ID }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          # `timeout` = SSH connection timeout; `command_timeout` = the script's
          # run budget (appleboy default is 10m — pinned explicitly so the health
          # poll below can never be silently cut short by an upstream default change).
          timeout: 10m
          command_timeout: 10m
          envs: JWT_SECRET,PII_ENCRYPTION_KEY,PII_HASH_PEPPER,PIN_PEPPER,ADMIN_JWT_SECRET,DATABASE_URL,REDIS_URL,INTERNAL_SERVICE_TOKEN,FAST2SMS_API_KEY,FAST2SMS_SENDER_ID,FAST2SMS_DLT_TEMPLATE_ID,CORS_ALLOWED_ORIGINS
          script: |
            set -e
            # CD-1: never leave a registry credential (even an expired job token)
            # in the box's ~/.docker/config.json — logout on EVERY exit path.
            trap 'docker logout ghcr.io >/dev/null 2>&1 || true' EXIT
            echo "Starting deployment..."
            cd ~/deployments/badabhai-platform
            echo "Pulling latest code from main..."
            git pull origin main
            echo "Logging into GHCR..."
            # CD-1: ephemeral job token (dies with the run) instead of a long-lived
            # PAT stored as a repo secret next to a PUBLIC repo. The package is
            # PRIVATE (anonymous pull 401-verified), so a login IS required; the
            # box only ever pulls during a deploy run, so the ephemeral token
            # suffices — and a leaked box can no longer pull outside a run.
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # CD-4: pin the IMMUTABLE per-commit tag pushed by build-and-push-image
            # (metadata-action type=sha -> prefix "sha-" + short 7-char sha, length
            # pinned via DOCKER_METADATA_SHORT_SHA_LENGTH above). Rollback = export
            # the previous sha tag and re-run compose up (docs/rollback-guide.md).
            export API_IMAGE="$(echo "ghcr.io/${{ github.repository }}/badabhai-api:sha-$(echo '${{ github.sha }}' | cut -c1-7)" | tr '[:upper:]' '[:lower:]')"
            echo "Deploying image: $API_IMAGE"

            # CD-0: base + staging overlay. The overlay pins NODE_ENV=production and
            # makes every production-required secret a fail-loud ${VAR:?} — a box
            # without real secrets FAILS HERE at compose interpolation (job goes red)
            # instead of booting on the public dev defaults. `--no-deps api` on `up`
            # is load-bearing: it is what keeps the compose-internal throwaway
            # postgres/adminer from ever starting on this box (see the depends_on
            # note in docker-compose.staging.yml) — staging's DATABASE_URL is the
            # real (Supabase) Postgres, never the compose-internal one. Passing -f
            # explicitly ALSO means the tracked docker-compose.override.yml (a
            # local-dev-only postgres remap) is NOT auto-loaded here.
            COMPOSE="docker compose -f docker-compose.yml -f docker-compose.staging.yml --profile api"
            $COMPOSE pull api

            # CD-1a: Redis IS box-local (owner decision) — it runs as this compose
            # project's `redis` service, so unlike postgres it MUST start here. The
            # api reaches it over the compose network at redis:6379, which is what
            # the REDIS_URL secret must say (NOT localhost — inside the api container
            # localhost is the api itself; and the host port is loopback-bound now).
            #
            # `--no-deps api` below would never start it (redis is only reachable as
            # an api depends_on), so start it EXPLICITLY and FIRST. Naming the service
            # starts ONLY it — redis declares no depends_on — so postgres/adminer
            # still never start; --no-deps here keeps that true even if redis were
            # later given one. Deliberately NOT `--wait`: docker-compose.staging.yml
            # records that the box's compose version is unverified, and a flag it
            # lacks would fail the deploy outright. Redis serves within ms and the
            # api's own boot is far slower, so ordering is safe — and the CD-3 health
            # gate below is the real backstop if it is not.
            $COMPOSE up -d --no-deps redis

            # TODO(CD-2, held: 0031 human sign-off + D1): migrations-in-pipeline would
            # run HERE — after the image pull, BEFORE the new code boots (CLAUDE.md §2
            # ordering: migrations never run after the code that assumes them). Held
            # pending owner sign-off on migration 0031 (destructive-adjacent billing-FK
            # change, §7 human-gated) + the prod-vs-staging D1 environment answer.
            # NOTE (CD-3 scope): the /health gate below checks CONNECTIVITY only
            # (SELECT 1 + Redis PING) — a fresh, UNMIGRATED DATABASE_URL still boots
            # and 200s while every real endpoint 500s. Until CD-2 lands, applying
            # migrations MANUALLY (owner, after 0031 sign-off) is a required pre-step
            # to the first real deploy against a fresh DB.

            $COMPOSE up -d --no-deps api
            $COMPOSE ps

            # CD-3: health-gate the deploy — the job must go RED when the API does not
            # come up (the old unconditional success echo could never fail). Poll on
            # the box itself: localhost sidesteps the instance firewall. Same poll
            # pattern as the e2e job's /health wait above. ~60s budget (30 x 2s).
            echo "Waiting for the API to become healthy..."
            healthy=0
            for i in $(seq 1 30); do
              if curl -sf http://localhost:3001/health >/dev/null 2>&1; then
                healthy=1
                echo "API healthy after attempt ${i}"
                break
              fi
              sleep 2
            done
            if [ "$healthy" -ne 1 ]; then
              echo "::error::API never became healthy — dumping container logs"
              $COMPOSE logs --tail=100 api
              exit 1
            fi
            echo "Deployment finished successfully!"
