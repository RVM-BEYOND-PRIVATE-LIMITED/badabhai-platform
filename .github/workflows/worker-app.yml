name: Worker app

# BLOCKING gate for the Flutter worker app (apps/worker-app). Replaces the old
# non-blocking `worker-app` job in ci.yml (TD002). Runs ONLY on changes under
# apps/worker-app (or this workflow), so unrelated PRs don't pay the Flutter cost
# and don't wait on it. A red check here means: do not merge.
on:
  push:
    branches: [main]
    paths:
      - "apps/worker-app/**"
      - ".github/workflows/worker-app.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/worker-app/**"
      - ".github/workflows/worker-app.yml"

concurrency:
  group: worker-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-test:
    name: Worker app (analyze / test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker-app
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      # Pin the Flutter version so CI is reproducible and the analyzer ruleset is
      # stable. Bump deliberately, not implicitly via `channel: stable`.
      #
      # MUST track the version the app is developed against (3.35.7 / Dart 3.9.2)
      # — `pubspec.lock` floors Dart at >=3.8.0, so an older pin cannot even
      # `pub get`. This pin sat at 3.27.4 (Dart 3.6) after the app moved to
      # 3.35.7 for the Android 15 16 KB page-size requirement, which broke the
      # gate; do not let it drift again.
      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: "3.35.7"
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      # BLOCKING: analyzer findings (error/warning/info) fail the build.
      - name: Analyze
        run: flutter analyze

      # BLOCKING: the scaffold ships a runnable widget test (test/widget_test.dart),
      # so the suite gates too. If/when this grows flaky or needs an emulator,
      # revisit — do not silently disable.
      - name: Test
        run: flutter test
