# Local infrastructure for BadaBhai development.
# This complements (does NOT replace) the Supabase workflow: use this Postgres
# for fully-offline local dev, or point DATABASE_URL at Supabase instead.
#
#   docker compose up -d         # start postgres + redis (+ adminer)
#   docker compose down          # stop
#   docker compose down -v       # stop and DELETE volumes (data loss)

services:
  postgres:
    # pgvector-enabled Postgres so the worker_profiles.embedding vector(768)
    # column + HNSW index work locally (matches Supabase, which has pgvector).
    image: pgvector/pgvector:pg16
    container_name: badabhai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: badabhai
      POSTGRES_PASSWORD: badabhai
      POSTGRES_DB: badabhai
    ports:
      - "5432:5432"
    volumes:
      - badabhai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U badabhai -d badabhai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: badabhai-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    # CD-1a: bind the published port to LOOPBACK, never 0.0.0.0. This redis runs with
    # NO password (no `requirepass`), and on the staging box it is the REAL redis
    # (owner decision: box-local, not managed) holding worker sessions, the OTP
    # rate-limit counters and the SMS kill-switch counters — on a box that also holds
    # REAL Fast2SMS credentials. A 0.0.0.0 publish would put that on the public
    # internet: docker inserts its DNAT rules into iptables ahead of ufw, so a
    # "ufw deny 6379" does NOT protect a published port.
    #
    # This MUST live in the BASE file, not the staging overlay: compose keys `ports`
    # by {ip, target, published, protocol} and APPENDS entries whose key differs, so
    # an overlay adding "127.0.0.1:6379:6379" would NOT remove a base "6379:6379" —
    # BOTH binds would survive and the 0.0.0.0 exposure would remain. (compose-spec
    # 13-merge.md "Unique resources"; verified with `docker compose config`.)
    #
    # Local dev is unaffected: host tools still reach it at localhost:6379, and the
    # api container reaches it over the compose network at redis:6379 — published
    # ports are host->container only and play no part in container->container.
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - badabhai_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Lightweight DB UI. Optional — remove if not needed.
  adminer:
    image: adminer:4
    container_name: badabhai-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # ---- Optional: the API with the WeasyPrint resume-render pipeline ENABLED ----
  # NOT started by `docker compose up` / `pnpm db:up` — it is guarded by a compose
  # profile, so it only comes up when you ask for it explicitly. This is the local
  # way to make the resume PDF download actually work (WeasyPrint runs INSIDE this
  # Linux container, so it renders even on a Windows host — unlike bare `pnpm dev`).
  #
  #   pnpm db:up && pnpm db:migrate                 # postgres+redis + schema
  #   export SUPABASE_URL=...  SUPABASE_SERVICE_ROLE_KEY=...   # your project; PRIVATE worker-resumes bucket must exist
  #   docker compose --profile api up --build api
  #
  # Full runbook + bucket provisioning: docs/resume-pdf-render-local.md
  api:
    # Also under the TD25a proxy-harness profile so `--profile proxy-harness up`
    # brings the API up behind the harness nginx. Plain `up` / `pnpm db:up` still
    # never start it.
    profiles: ["api", "proxy-harness"]
    image: ${API_IMAGE:-badabhai-api:latest}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: badabhai-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      # NODE_ENV=development keeps the dev-default PII/JWT/admin config guards happy
      # (the Dockerfile sets production). DEV-ONLY container — NOT production-safe
      # (dev secrets); a staging image must supply real PII/JWT/admin secrets.
      NODE_ENV: development
      # Overridable so the API container can target the real (Supabase) DB; defaults
      # to the compose-internal postgres. `:-` not `:?` — see the SUPABASE_URL note.
      DATABASE_URL: ${DATABASE_URL:-postgresql://badabhai:badabhai@postgres:5432/badabhai}
      REDIS_URL: redis://redis:6379
      # Boot guards require these present, but the render path never sends SMS/email —
      # dummy values satisfy the guards. `PAYER_LOGIN_METHOD=whatsapp` avoids needing
      # real ZeptoMail email creds just to boot.
      FAST2SMS_API_KEY: ${FAST2SMS_API_KEY:-dev-dummy}
      FAST2SMS_SENDER_ID: ${FAST2SMS_SENDER_ID:-BBHAII}
      FAST2SMS_DLT_TEMPLATE_ID: ${FAST2SMS_DLT_TEMPLATE_ID:-0000000000000000000}
      PAYER_LOGIN_METHOD: whatsapp
      # ---- Resume PDF render (the point of this service) ----
      RESUME_RENDER_ENABLED: "true"
      RESUMES_BUCKET: ${RESUMES_BUCKET:-worker-resumes}
      # REQUIRED for rendering — your Supabase project + a PRIVATE `worker-resumes`
      # bucket. Left as empty defaults (NOT `${..:?}`) on purpose: compose interpolates
      # the WHOLE file before profile filtering, so a `:?` here would break plain
      # `pnpm db:up` for anyone without these set. Instead the API fails closed at the
      # first render ("Supabase Storage is not configured") — which only happens under
      # `--profile api`. Export these before `docker compose --profile api up`.
      # See docs/resume-pdf-render-local.md.
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-token}
      # TD25a — trust-proxy hop count for the reverse-proxy harness below. Default 0
      # (fail-safe, same as the config schema): req.ip = socket peer, XFF ignored.
      # Set to 1 when running behind the harness nginx (the correct single-hop value):
      #   TRUST_PROXY_HOP_COUNT=1 docker compose --profile proxy-harness up --build
      # A hop COUNT, never a blanket `true` — see infra/docker/proxy-harness/README.md.
      TRUST_PROXY_HOP_COUNT: ${TRUST_PROXY_HOP_COUNT:-0}
      # TD81(a) — point the API at the compose ai-service instead of its own
      # localhost. The schema default is http://localhost:8000
      # (packages/config/src/server.ts), which INSIDE this container is the api
      # itself: nothing listens there, the AI call fails, and the API degrades to
      # its safe TypeScript mock (real_call=false) — silently, because that
      # fallback is a deliberate fail-safe and never turns anything red. The
      # compose-network name is the only value that can be right for a container.
      # No regression when the ai-service is NOT up (e.g. `--profile api up api`,
      # which names one service): the connection fails the same way it does today
      # and the same mock fallback applies. Overridable so the api container can be
      # pointed at a host-run `uvicorn app.main:app` during AI development.
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai-service:8000}
      # TD67 — the ONE service-level bearer for the ai-service's routes. VALUELESS
      # ON PURPOSE (the compose "pass-through" form): the value is taken from the
      # host environment and, when absent there, the variable is NOT SET in the
      # container at all. It must NOT be written as `${AI_INTERNAL_TOKEN:-}`, which
      # would hand the container an EMPTY STRING — and empty is not "unset" for
      # either side of this seam: the api's Zod is `z.string().min(16).optional()`
      # (an empty string is a PRESENT string, so it fails min(16) and
      # loadServerConfig throws at boot) and the ai-service's is
      # `Field(default=None, min_length=16)` (same rejection at Settings()). A
      # `:-` default would therefore crash-loop BOTH services the moment either
      # gained this line. Set it on BOTH sides or NEITHER: a half-flip makes every
      # api→ai call 401 and the API "degrades to mock, logged at ERROR" — TD81's
      # own failure class. Never a committed value.
      AI_INTERNAL_TOKEN:

  # ---- Optional: the FastAPI AI service (pseudonymization gateway) ----
  # TD81(a). NOT started by `docker compose up` / `pnpm db:up` — profile-gated,
  # exactly like the api. It joins the SAME profiles as the api (so
  # `docker compose --profile api up` brings the pair up together and the
  # AI_SERVICE_URL above actually resolves) plus its own `ai-service` profile for
  # working on the Python side alone:
  #
  #   docker compose --profile ai-service up --build ai-service   # just this service
  #   docker compose --profile api up --build                     # api + ai-service + deps
  #   curl localhost:8000/health                                  # loopback-published below
  #
  # Naming it in the SAME profiles as the api is load-bearing for the deploy, not
  # just convenience: `docker compose --profile api pull ai-service` must resolve
  # on the box, and relying on compose's "explicitly-targeted services enable
  # their own profile" behaviour would be a version bet — docker-compose.staging.yml
  # records that the box's compose version is NOT verified.
  ai-service:
    profiles: ["ai-service", "api", "proxy-harness"]
    image: ${AI_SERVICE_IMAGE:-badabhai-ai-service:latest}
    build:
      # Context is apps/ai-service, NOT the repo root — the service has no
      # workspace dependencies, so it needs none of the monorepo. See the header
      # of apps/ai-service/Dockerfile; apps/ai-service/.dockerignore applies.
      context: apps/ai-service
      dockerfile: Dockerfile
    container_name: badabhai-ai-service
    restart: unless-stopped
    # NO depends_on, and that is deliberate: this service is DB-FREE by design
    # (the api runs every authorized query — see the skill_store seam in
    # app/config.py) and its only optional store, the TD27 spend ledger, is
    # constructed lazily and FAILS CLOSED, so postgres/redis are not preconditions
    # for it to boot. It also keeps `up -d --no-deps ai-service` on the box
    # trivially honest. The api likewise does NOT depends_on this service: an
    # unreachable ai-service must degrade to the mock, never block the API's boot.
    ports:
      # CD-1a precedent, applied before it can bite: bind the published port to
      # LOOPBACK, never 0.0.0.0. This container answers /pseudonymize and the
      # profiling/extraction routes, and TD67's service token is UNSET by default
      # (open posture) — a 0.0.0.0 publish would put an unauthenticated AI surface
      # on the public internet on the staging box, and a `ufw deny 8000` would NOT
      # save it (docker's DNAT rules land ahead of ufw).
      #
      # Like redis, this MUST live in the BASE file: compose keys `ports` by
      # {ip, target, published, protocol} and APPENDS entries whose key differs, so
      # an overlay could not remove a base "8000:8000" — both binds would survive.
      # Nothing is lost: the api reaches it over the compose network at
      # ai-service:8000 (published ports play no part in container→container), and
      # the box-local deploy health-gate curls it on 127.0.0.1.
      - "127.0.0.1:8000:8000"
    environment:
      # ---- CLAUDE.md §2 INVARIANT 5: real LLM calls are GATED AND OFF BY DEFAULT.
      # This literal "false" is committed and must STAY "false" in every committed
      # file. Flipping it is an owner/§7 action taken in the STAGING ENVIRONMENT's
      # secrets, never in git, and it requires GEMINI_FLASH_API_KEY as well (the
      # config fails closed on either being absent). The keys below are declared so
      # that arming real mode later is an ENV action with NO code change — declared
      # is not armed.
      AI_ENABLE_REAL_CALLS: "false"
      # Optional provider credentials — pass-through, EMPTY BY DEFAULT, never a
      # committed value. `:-` is safe for these two (unlike AI_INTERNAL_TOKEN
      # below): both are `str | None` with no length check, and "" is falsy, so an
      # empty value reads exactly as "not configured" and real calls stay blocked
      # with the reason "GEMINI_FLASH_API_KEY is not set".
      GEMINI_FLASH_API_KEY: ${GEMINI_FLASH_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # TD27 shared spend ledger. UNSET (the default) = the in-process backend,
      # which is CORRECT here because the image runs exactly ONE uvicorn worker
      # (see apps/ai-service/Dockerfile) — per-process caps and global caps are the
      # same thing at one worker. Set it (e.g. redis://redis:6379/0, this project's
      # redis) BEFORE either adding workers or flipping real calls. NOTE THE NAME:
      # AI_SPEND_REDIS_URL, never REDIS_URL — AI-ENV-1 renamed it precisely because
      # a compose `environment:` block sharing the api's REDIS_URL silently armed
      # this service against a store it does not own.
      AI_SPEND_REDIS_URL: ${AI_SPEND_REDIS_URL:-}
      # TD67 service token — VALUELESS pass-through form, for the same reason as
      # the api's entry above: `${AI_INTERNAL_TOKEN:-}` would supply "" and
      # `Field(default=None, min_length=16)` rejects an empty string at Settings(),
      # i.e. at STARTUP (deliberately — an empty token would otherwise arm the gate
      # VACUOUSLY, since compare_digest("", "") is True). Set on BOTH sides or
      # NEITHER.
      AI_INTERNAL_TOKEN:

  # ---- Optional: TD25a reverse-proxy harness (ONE honest edge hop in front of api) ----
  # NOT started by `docker compose up` / `pnpm db:up` — profile-gated. An nginx that
  # APPENDS the connecting peer to X-Forwarded-For ($proxy_add_x_forwarded_for), i.e.
  # exactly what a real single-hop LB does, so the TRUST_PROXY_HOP_COUNT failure modes
  # (hop=0 shared-bucket collapse; hop-too-high forged-XFF identity) can be reproduced
  # locally. Runbook + two-client QA scenario + hop→topology table:
  #   infra/docker/proxy-harness/README.md
  proxy:
    profiles: ["proxy-harness"]
    image: nginx:1.27-alpine
    container_name: badabhai-proxy-harness
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8088:8080"
    volumes:
      - ./infra/docker/proxy-harness/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  badabhai_pgdata:
  badabhai_redisdata:
