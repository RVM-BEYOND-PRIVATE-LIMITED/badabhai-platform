# Local infrastructure for BadaBhai development.
# This complements (does NOT replace) the Supabase workflow: use this Postgres
# for fully-offline local dev, or point DATABASE_URL at Supabase instead.
#
#   docker compose up -d         # start postgres + redis (+ adminer)
#   docker compose down          # stop
#   docker compose down -v       # stop and DELETE volumes (data loss)

services:
  postgres:
    # pgvector-enabled Postgres so the worker_profiles.embedding vector(768)
    # column + HNSW index work locally (matches Supabase, which has pgvector).
    image: pgvector/pgvector:pg16
    container_name: badabhai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: badabhai
      POSTGRES_PASSWORD: badabhai
      POSTGRES_DB: badabhai
    ports:
      - "5432:5432"
    volumes:
      - badabhai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U badabhai -d badabhai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: badabhai-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    # CD-1a: bind the published port to LOOPBACK, never 0.0.0.0. This redis runs with
    # NO password (no `requirepass`), and on the staging box it is the REAL redis
    # (owner decision: box-local, not managed) holding worker sessions, the OTP
    # rate-limit counters and the SMS kill-switch counters — on a box that also holds
    # REAL Fast2SMS credentials. A 0.0.0.0 publish would put that on the public
    # internet: docker inserts its DNAT rules into iptables ahead of ufw, so a
    # "ufw deny 6379" does NOT protect a published port.
    #
    # This MUST live in the BASE file, not the staging overlay: compose keys `ports`
    # by {ip, target, published, protocol} and APPENDS entries whose key differs, so
    # an overlay adding "127.0.0.1:6379:6379" would NOT remove a base "6379:6379" —
    # BOTH binds would survive and the 0.0.0.0 exposure would remain. (compose-spec
    # 13-merge.md "Unique resources"; verified with `docker compose config`.)
    #
    # Local dev is unaffected: host tools still reach it at localhost:6379, and the
    # api container reaches it over the compose network at redis:6379 — published
    # ports are host->container only and play no part in container->container.
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - badabhai_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Lightweight DB UI. Optional — remove if not needed.
  adminer:
    image: adminer:4
    container_name: badabhai-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # ---- Optional: the API with the WeasyPrint resume-render pipeline ENABLED ----
  # NOT started by `docker compose up` / `pnpm db:up` — it is guarded by a compose
  # profile, so it only comes up when you ask for it explicitly. This is the local
  # way to make the resume PDF download actually work (WeasyPrint runs INSIDE this
  # Linux container, so it renders even on a Windows host — unlike bare `pnpm dev`).
  #
  #   pnpm db:up && pnpm db:migrate                 # postgres+redis + schema
  #   export SUPABASE_URL=...  SUPABASE_SERVICE_ROLE_KEY=...   # your project; PRIVATE worker-resumes bucket must exist
  #   docker compose --profile api up --build api
  #
  # Full runbook + bucket provisioning: docs/resume-pdf-render-local.md
  api:
    # Also under the TD25a proxy-harness profile so `--profile proxy-harness up`
    # brings the API up behind the harness nginx. Plain `up` / `pnpm db:up` still
    # never start it.
    profiles: ["api", "proxy-harness"]
    image: ${API_IMAGE:-badabhai-api:latest}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: badabhai-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      # NODE_ENV=development keeps the dev-default PII/JWT/admin config guards happy
      # (the Dockerfile sets production). DEV-ONLY container — NOT production-safe
      # (dev secrets); a staging image must supply real PII/JWT/admin secrets.
      NODE_ENV: development
      # Overridable so the API container can target the real (Supabase) DB; defaults
      # to the compose-internal postgres. `:-` not `:?` — see the SUPABASE_URL note.
      DATABASE_URL: ${DATABASE_URL:-postgresql://badabhai:badabhai@postgres:5432/badabhai}
      REDIS_URL: redis://redis:6379
      # Boot guards require these present, but the render path never sends SMS/email —
      # dummy values satisfy the guards. `PAYER_LOGIN_METHOD=whatsapp` avoids needing
      # real ZeptoMail email creds just to boot.
      FAST2SMS_API_KEY: ${FAST2SMS_API_KEY:-dev-dummy}
      FAST2SMS_SENDER_ID: ${FAST2SMS_SENDER_ID:-BBHAII}
      FAST2SMS_DLT_TEMPLATE_ID: ${FAST2SMS_DLT_TEMPLATE_ID:-0000000000000000000}
      PAYER_LOGIN_METHOD: whatsapp
      # ---- Resume PDF render (the point of this service) ----
      RESUME_RENDER_ENABLED: "true"
      RESUMES_BUCKET: ${RESUMES_BUCKET:-worker-resumes}
      # REQUIRED for rendering — your Supabase project + a PRIVATE `worker-resumes`
      # bucket. Left as empty defaults (NOT `${..:?}`) on purpose: compose interpolates
      # the WHOLE file before profile filtering, so a `:?` here would break plain
      # `pnpm db:up` for anyone without these set. Instead the API fails closed at the
      # first render ("Supabase Storage is not configured") — which only happens under
      # `--profile api`. Export these before `docker compose --profile api up`.
      # See docs/resume-pdf-render-local.md.
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-token}
      # TD25a — trust-proxy hop count for the reverse-proxy harness below. Default 0
      # (fail-safe, same as the config schema): req.ip = socket peer, XFF ignored.
      # Set to 1 when running behind the harness nginx (the correct single-hop value):
      #   TRUST_PROXY_HOP_COUNT=1 docker compose --profile proxy-harness up --build
      # A hop COUNT, never a blanket `true` — see infra/docker/proxy-harness/README.md.
      TRUST_PROXY_HOP_COUNT: ${TRUST_PROXY_HOP_COUNT:-0}

  # ---- Optional: TD25a reverse-proxy harness (ONE honest edge hop in front of api) ----
  # NOT started by `docker compose up` / `pnpm db:up` — profile-gated. An nginx that
  # APPENDS the connecting peer to X-Forwarded-For ($proxy_add_x_forwarded_for), i.e.
  # exactly what a real single-hop LB does, so the TRUST_PROXY_HOP_COUNT failure modes
  # (hop=0 shared-bucket collapse; hop-too-high forged-XFF identity) can be reproduced
  # locally. Runbook + two-client QA scenario + hop→topology table:
  #   infra/docker/proxy-harness/README.md
  proxy:
    profiles: ["proxy-harness"]
    image: nginx:1.27-alpine
    container_name: badabhai-proxy-harness
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8088:8080"
    volumes:
      - ./infra/docker/proxy-harness/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  badabhai_pgdata:
  badabhai_redisdata:
