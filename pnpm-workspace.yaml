# pnpm workspace definition for the BadaBhai monorepo.
# Python (apps/ai-service) and Flutter (apps/worker-app) manage their own
# toolchains and are intentionally NOT part of the pnpm workspace.
packages:
  - "apps/api"
  - "apps/web"
  - "apps/payer-web"
  - "packages/*"
  - "tests/e2e"
# Allow these dependencies to run install/build scripts (pnpm sandboxes the rest).
# esbuild ships a platform binary that vitest/tsup need at runtime.
# sharp ships native binaries used by Next.js image optimization.
# @nestjs/core's postinstall is only a funding message -> not needed.
allowBuilds:
  esbuild: true
  sharp: true
  '@nestjs/core': false
  # bullmq's optional native msgpack accelerator — the pure-JS fallback is fine,
  # so skip its native build (avoids a native toolchain requirement on Windows).
  msgpackr-extract: false
onlyBuiltDependencies:
  - esbuild
  - sharp
# Standard pnpm key (used by CI): explicitly skip these build scripts without
# erroring. @nestjs/core's postinstall is only a funding message.
ignoredBuiltDependencies:
  - "@nestjs/core"
  - msgpackr-extract
